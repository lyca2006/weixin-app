<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>天天向上一家人</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

@keyframes gradient-shift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

body {
  min-height: 100vh;
  background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #533483);
  background-size: 400% 400%;
  animation: gradient-shift 15s ease infinite;
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  color: #fff;
  overflow-x: hidden;
}

.stars { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0; }
.star { position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%; animation: twinkle ease-in-out infinite alternate; }
@keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; } }

.container {
  position: relative; z-index: 1;
  max-width: 420px; margin: 0 auto; padding: 20px 16px;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}

@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

.hero-icon { font-size: 48px; animation: float 3s ease-in-out infinite; margin-bottom: 16px; }

.hero-title {
  font-size: 26px; font-weight: 800; margin-bottom: 8px; text-align: center;
  background: linear-gradient(135deg, #f093fb, #f5576c, #fda085);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.hero-subtitle {
  font-size: 13px; color: rgba(255,255,255,0.45); margin-bottom: 32px; text-align: center;
}

/* 分隔线标题 */
.divider-title {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px; width: 100%;
}
.divider-title::before, .divider-title::after {
  content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.12);
}
.divider-title span {
  font-size: 14px; color: rgba(255,255,255,0.85); font-weight: 700; white-space: nowrap;
}

/* 填写资料卡 */
.profile-card {
  width: 100%; padding: 20px; border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  display: flex; align-items: center; gap: 14px; margin-bottom: 28px;
}
.profile-card .p-icon { font-size: 32px; flex-shrink: 0; }
.profile-card .p-info { flex: 1; }
.profile-card .p-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.profile-card .p-desc { font-size: 11px; color: rgba(255,255,255,0.4); }
.profile-card .p-btn {
  padding: 10px 18px; border-radius: 12px; border: none; flex-shrink: 0;
  background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff;
  font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none;
  white-space: nowrap; transition: all 0.2s;
}
.profile-card .p-btn:active { transform: scale(0.95); }

/* 匹配卡片 */
.match-cards { display: flex; gap: 12px; width: 100%; }
.match-card {
  flex: 1; padding: 24px 16px; border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  text-decoration: none; color: #fff; transition: all 0.3s;
  -webkit-tap-highlight-color: transparent;
}
.match-card:active { transform: scale(0.96); }
.match-card:hover {
  border-color: rgba(245,87,108,0.4);
  background: rgba(245,87,108,0.08);
}
.match-card .m-icon { font-size: 36px; }
.match-card .m-title { font-size: 16px; font-weight: 700; }
.match-card .m-btn {
  padding: 8px 20px; border-radius: 10px; border: none;
  background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff;
  font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.match-card .m-btn:active { transform: scale(0.95); }

/* 滚动头像展示 */
.scroll-section { width: 100vw; margin-left: calc(-50vw + 50%); margin-top: 36px; overflow: hidden; }
.scroll-label { text-align: center; font-size: 12px; color: rgba(255,255,255,0.35); margin-bottom: 12px; }
.scroll-track {
  display: flex; gap: 20px; width: max-content;
  animation: scrollLeft 30s linear infinite;
}
.scroll-track:hover { animation-play-state: paused; }
@keyframes scrollLeft { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
.scroll-item {
  display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0;
}
.scroll-item img {
  width: 44px; height: 44px; border-radius: 50%; object-fit: cover;
  border: 1.5px solid rgba(255,255,255,0.15);
}
.scroll-item span { font-size: 11px; color: rgba(255,255,255,0.5); white-space: nowrap; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <div class="hero-icon">💘</div>
  <div class="hero-title">动动手指，瓜分群友</div>
  <div class="hero-subtitle">找到与你灵魂匹配的人</div>

  <div class="divider-title"><span>第1步：填写资料</span></div>
  <div class="profile-card">
    <div class="p-icon">📝</div>
    <div class="p-info">
      <div class="p-title">填写你的资料</div>
      <div class="p-desc">完善个人资料，让更多人了解你</div>
    </div>
    <a class="p-btn" href="submit-test.html?from=home">填写资料</a>
  </div>

  <div class="divider-title"><span>第2步：匹配群友</span></div>
  <div class="match-cards">
    <a class="match-card" href="quiz-v2-test.html?mode=female">
      <div class="m-icon">🧑</div>
      <div class="m-title">我是男生</div>
      <div class="m-btn">开始匹配 →</div>
    </a>
    <a class="match-card" href="quiz-v2-test.html?mode=male">
      <div class="m-icon">👩</div>
      <div class="m-title">我是女生</div>
      <div class="m-btn">开始匹配 →</div>
    </a>
  </div>

  <div class="scroll-section">
    <div class="scroll-label">✨ 群友风采 ✨</div>
    <div class="scroll-track" id="scrollTrack"></div>
  </div>
</div>

<script>
function createStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.width = s.style.height = (Math.random() * 2 + 1) + 'px';
    s.style.animationDuration = (Math.random() * 3 + 2) + 's';
    s.style.animationDelay = Math.random() * 3 + 's';
    c.appendChild(s);
  }
}
createStars();

// 滚动头像展示
const scrollMembers = [
  { name: '陈总', avatar: 'avatars/chenzhong.png' },
  { name: '细总', avatar: 'avatars/xizhong.png' },
  { name: '医生', avatar: 'avatars/yisheng.png' },
  { name: '锋锋', avatar: 'avatars/fengfeng.png' },
  { name: '小林哥', avatar: 'avatars/xiaolinge.png' },
  { name: '张天赋', avatar: 'avatars/zhangtiancai.png' },
  { name: '大象', avatar: 'avatars/daxiang.png' },
  { name: 'KING', avatar: 'avatars/king.png' },
  { name: '陈生', avatar: 'avatars/chensheng.png' },
  { name: '小肥', avatar: 'avatars/xiaofei.png' },
  { name: '股神', avatar: 'avatars/gushen.png' },
  { name: '梁总', avatar: 'avatars/liangzhong.png' },
  { name: 'TMC', avatar: 'avatars/tmc.png' },
  { name: '锐哥', avatar: 'avatars/ruige.png' },
  { name: '钟总', avatar: 'avatars/zhongzhong.png' },
];

function buildScroll(members) {
  const track = document.getElementById('scrollTrack');
  const html = members.map(m => `<div class="scroll-item"><img src="${m.avatar}" alt="${m.name}"><span>${m.name}</span></div>`).join('');
  track.innerHTML = html + html;
  const itemWidth = 64;
  const totalWidth = members.length * itemWidth;
  track.style.animationDuration = Math.max(members.length * 1.5, 20) + 's';
}
buildScroll(scrollMembers);

// 后台拉取提交的人的头像，追加进滚动条（不重建）
(async function() {
  try {
    const TK = ['ghp_wgKIbURm','KbscYDN03D','o84FOIRonx','bH1p1R8i'];
    const TOKEN = TK.join('');
    const resp = await fetch('https://api.github.com/repos/lyca2006/weixin-app/contents/submissions', {
      headers: { 'Authorization': 'token ' + TOKEN, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!resp.ok) return;
    const files = await resp.json();
    const jsonFiles = files.filter(f => f.name.endsWith('.json') && f.name !== 'hardcoded-overrides.json');
    const results = await Promise.all(jsonFiles.map(async f => {
      try {
        const r = await fetch(f.download_url);
        return await r.json();
      } catch(e) { return null; }
    }));
    const submitted = results.filter(c => c && c.avatar && c.nickname);
    if (submitted.length > 0) {
      const all = [...scrollMembers, ...submitted.map(s => ({ name: s.nickname, avatar: s.avatar }))];
      const track = document.getElementById('scrollTrack');
      track.style.animation = 'none';
      track.offsetHeight;
      buildScroll(all);
    }
  } catch(e) {}
})();
</script>
</body>
</html>
