body {

  z-index: 0;
}
.star {

  background: #fff;
  border-radius: 50%;

}
@keyframes twinkle {

  100% { opacity: 1; transform: scale(1.5); }
}

.container {

.start-subtitle {

.progress-text {

// ==================== 游戏逻辑 ====================
let currentQ = 0;
let answers = [];

// 分组：按答题倾向分成4组，每组2-4人
// A多 → 成熟稳重派：陈总、小林哥、梁总
// B多 → 暖心体贴派：细总、锋锋、KING
// C多 → 有趣灵魂派：张天赋、小肥、大象、小林哥
// D多 → 魅力行动派：医生、TMC、陈生、股神
// 每个人可以出现在多个组里，确保都有机会
const groups = {
  A: ['chenzhong', 'xiaolinge', 'liangzhong', 'king'],
  B: ['xizhong', 'fengfeng', 'king', 'xiaolinge'],
  C: ['zhangtiancai', 'xiaofei', 'daxiang', 'fengfeng'],
  D: ['yisheng', 'tmc', 'chensheng', 'gushen']
};

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  currentQ = 0;
  answers = [];
  showPage('quizPage');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const percent = ((currentQ) / questions.length * 100).toFixed(0);
  document.getElementById('progressFill').style.width = percent + '%';
  document.getElementById('progressText').textContent = `${currentQ + 1} / ${questions.length}`;

  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'card-in 0.4s ease';

  const letters = ['A', 'B', 'C', 'D'];
  card.innerHTML = `
    <div class="question-num">第 ${currentQ + 1} 题</div>
    <div class="question-text">${q.q}</div>
    ${q.hint ? `<div class="question-hint">${q.hint}</div>` : ''}
    <div class="options">
      ${q.options.map((opt, i) => `
        <div class="option-btn" onclick="selectOption(${i}, this)">
          <div class="option-letter">${letters[i]}</div>
          <div>${opt.text}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function selectOption(idx, el) {
  el.classList.add('selected');
  const allBtns = el.parentElement.querySelectorAll('.option-btn');
  allBtns.forEach(b => { b.style.pointerEvents = 'none'; });

  answers.push(['A', 'B', 'C', 'D'][idx]);

  setTimeout(() => {
    currentQ++;
    if (currentQ < questions.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }, 500);
}

function showResult() {
  const match = findBestMatch();
  showPage('resultPage');
  spawnHearts();

  document.getElementById('resultInner').innerHTML = `
    <div class="result-label">✨ 你的命中注定是 ✨</div>
    <img class="result-avatar" src="${match.avatar}" alt="${match.name}">
    <div class="result-name">${match.name}</div>
    <div class="result-title">${match.title}</div>
    <div class="result-desc">${match.desc}</div>
  `;
}

function findBestMatch() {
  // 统计ABCD各选了几次
  const count = { A: 0, B: 0, C: 0, D: 0 };
  answers.forEach(a => count[a]++);

  // 找出票数最高的类型（可能有并列）
  const maxCount = Math.max(count.A, count.B, count.C, count.D);
  const topTypes = Object.keys(count).filter(k => count[k] === maxCount);

  // 从并列的类型中随机选一个
  const chosenType = topTypes[Math.floor(Math.random() * topTypes.length)];

  // 从对应组里随机选一个人
  const group = groups[chosenType];
  const chosenId = group[Math.floor(Math.random() * group.length)];

  return members.find(m => m.id === chosenId);
}

function restart() {
  showPage('startPage');
}

function shareResult() {
  const name = document.querySelector('.result-name')?.textContent || '';
  const text = `我刚测出我的命中注定是「${name}」！快来测测你的是谁？💘`;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text + '\n' + location.href).then(() => {
      alert('已复制到剪贴板，快去群里分享吧！💕');
    }).catch(() => {
      prompt('复制以下内容分享到群里：', text);
    });
  } else {
    prompt('复制以下内容分享到群里：', text);
  }
}

// ==================== 视觉效果 ====================
function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDuration = (1 + Math.random() * 3) + 's';
    star.style.animationDelay = (Math.random() * 3) + 's';
    star.style.width = star.style.height = (1 + Math.random() * 2) + 'px';
    container.appendChild(star);
  }
}

function spawnHearts() {
  const emojis = ['💕', '💗', '💖', '💘', '✨', '🌟', '💝'];
  for (let i = 0; i < 15; i++) {
    setTimeout(() => {
      const heart = document.createElement('div');
      heart.className = 'falling-heart';
      heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      heart.style.left = Math.random() * 100 + '%';
      heart.style.top = '-30px';
      heart.style.fontSize = (16 + Math.random() * 20) + 'px';
      heart.style.animationDuration = (3 + Math.random() * 3) + 's';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }, i * 200);
  }
}

createStars();
