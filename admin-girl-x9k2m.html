.loading-text { text-align: center; color: rgba(255,255,255,0.4); padding: 40px; font-size: 14px; }

.card {

}
.card.modified { border-color: rgba(245,87,108,0.4); }
.card-header { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 10px; }

}
.card-avatar-placeholder {

.card-meta { flex: 1; min-width: 0; }

.card-gender.female { background: rgba(245,87,108,0.2); color: #f5576c; }

  font-size: 14px; font-family: monospace; color: #4fc3f7; letter-spacing: 2px;

.card-time { font-size: 10px; color: rgba(255,255,255,0.2); margin-top: 2px; }

.modal-overlay {

.toast.success { background: #2e7d32; color: #fff; }
.toast.error { background: #c62828; color: #fff; }

// ==================== Utility ====================
function findIdx(qid, ans) {
  const opts = femaleOptionTexts[qid];
  if (!opts || !ans) return -1;
  return opts.findIndex(o => ans === o || ans.includes(o.slice(2)) || o.includes(ans));
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => { t.classList.remove('show'); }, 2500);
}

function updateBatchBtn() {
  const btn = document.getElementById('batchSaveBtn');

  }
}

      '舍得给自己花钱的女生，骨子里是真正爱自己的。',
      '悦己至上，买到心仪的东西时眼睛会发光——那个笑容无价。'
    ],
    3: [
      '赚了钱第一个想到的是家人，这种善良不是装出来的。',
      '给妈妈买礼物时的认真劲儿，暖到让人想把全世界都给她。',
      '她的善良是刻在DNA里的，利他精神让人忍不住想保护她。',
      '挣钱是为了让身边的人过得更好——这份温柔太珍贵了。'
    ]
  };

  // Endings
  const ends = [
    '这种女生，遇到了就别犹豫，错过了就是别人的了。',
    '她值得被认真对待——不是因为她完美，是因为她真实。',
    '如果你想找一个能一起笑、一起扛的人，她就是最好的答案。',
    '遇到她，你会明白什么叫"原来你在这里"。',
    '这种宝藏女孩，认识了就是赚到了。',
    '有些人是惊艳一瞬间，她是越了解越让人心动的类型。',
    '别被表面迷惑，她的内在比外在更让人上瘾。',
    '跟她在一起，你会发现生活突然变得有趣了很多。',
    '她不完美，但她很真——而真，才是最难得的奢侈品。',
    '如果缘分是一道数学题，她就是那个唯一的正确答案。',
    '兄弟，这种女生不主动追，天理难容。',
    '别想太多了，心动就行动，她值得。',
    '总结：宝藏本人，限量发售，先到先得。',
    '如果你还在等一个人让你觉得"就是她了"，那现在可以停了。'
  ];

  // ===== Assemble Description =====
  let parts = [];
  if (sIdx >= 0 && sD[sIdx]) parts.push(pick(sD[sIdx]));
  if (rIdx >= 0 && rD[rIdx]) parts.push(pick(rD[rIdx]));
  if (hIdx >= 0 && hD[hIdx]) parts.push(pick(hD[hIdx]));
  if (tIdx >= 0 && tD[tIdx]) parts.push(pick(tD[tIdx]));
  if (slIdx >= 0 && slD[slIdx]) parts.push(pick(slD[slIdx]));
  if (mIdx >= 0 && mD[mIdx]) parts.push(pick(mD[mIdx]));
  parts.push(pick(ends));

  if (parts.length < 4) {
    parts.splice(0, 0, '她是那种第一眼就让人想认识的女生。');
  }

  return { title, desc: parts.join('') };
}

// ==================== Filter ====================
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

// ==================== Render ====================
function renderCards() {
  const list = document.getElementById('cardList');
  const filtered = currentFilter === 'all' ? allData :
    currentFilter === 'female' ? allData.filter(d => d.gender === 'female') :
    allData.filter(d => d.gender === 'male');

  const totalFemale = allData.filter(d => d.gender === 'female').length;
  const totalMale = allData.filter(d => d.gender === 'male').length;
  document.getElementById('countText').textContent = `共 ${allData.length} 份档案 (👩${totalFemale} 🧑${totalMale})` + (currentFilter !== 'all' ? `，显示 ${filtered.length}` : '');

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>暂无档案</div></div>';
    return;
  }

  list.innerHTML = filtered.map(d => {
    const idx = allData.indexOf(d);
    const isHardcoded = !!d._isHardcoded;
    const hasAnswers = d.answers && Object.keys(d.answers).length > 0;
    const isModified = modifiedSet.has(idx);

    // ABCD string (only for submitted users with answers)
    let abcdHtml = '';
    if (hasAnswers) {
      const abcd = qIds.map(qid => {
        const ans = (d.answers || {})[qid] || '';
        const i = findIdx(qid, ans);
        return i >= 0 ? letters[i] : '?';
      }).join('');
      abcdHtml = `<div class="card-abcd">${abcd}</div>`;
    }

    // Title & desc
    let displayTitle, displayDesc;
    if (isHardcoded) {
      displayTitle = d._introOverride ? d._introOverride.title : d.title;
      displayDesc = d._introOverride ? d._introOverride.desc : d.desc;
    } else {
      const intro = d._introOverride || d._introCache || generateFemaleIntro(d.answers);
      if (!d._introOverride && !d._introCache) d._introCache = intro;
      displayTitle = (d._introOverride || d._introCache || intro).title;
      displayDesc = (d._introOverride || d._introCache || intro).desc;
    }

    // Avatar
    const avatarHtml = d.avatar
      ? `<img class="card-avatar" src="${d.avatar}" alt="${d.nickname}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="card-avatar-placeholder" style="display:none">${d.gender === 'male' ? '🧑' : '👩'}</div>`
      : `<div class="card-avatar-placeholder">${d.gender === 'male' ? '🧑' : '👩'}</div>`;

    // Gender badge
    const genderBadge = d.gender === 'male'
      ? '<span class="card-gender male">♂ 男</span>'
      : '<span class="card-gender female">♀ 女</span>';

    // Buttons row
    let btnsHtml = `<button class="card-action-btn regen" onclick="regenInline(${idx})">🔄 换一版</button>`;
    btnsHtml += `<button class="card-action-btn" onclick="openEditIntro(${idx})">✏️ 编辑</button>`;
    if (!isHardcoded) {
      btnsHtml += `<button class="card-action-btn" onclick="openRename(${idx})">📝 改名</button>`;
      btnsHtml += `<button class="card-action-btn delete" onclick="openDelete(${idx})">🗑️ 删除</button>`;
    }

    return `<div class="card${isModified ? ' modified' : ''}" id="card-${idx}">
      <div class="card-header">
        ${avatarHtml}
        <div class="card-meta">
          <div class="card-top-row">
            <div class="card-left">
              <span class="card-name">${d.nickname}</span>
              ${genderBadge}
            </div>
          </div>
          ${abcdHtml}
          <div class="card-time">${d.time || (isHardcoded ? '群友' : '')}</div>
        </div>
      </div>
      <div class="card-intro">
        <div class="intro-title">${displayTitle}</div>
        <div class="intro-desc">${displayDesc}</div>
      </div>
      <div class="card-btn-row">
        ${btnsHtml}
      </div>
    </div>`;
  }).join('');
}

// ==================== Regen Inline ====================
function regenInline(idx) {
  const d = allData[idx];
  if (d._isHardcoded) {
    // Hardcoded males don't have answers, so just regenerate is not meaningful
    // But we allow it to shuffle between original title/desc
    showToast('男生档案暂不支持重新生成', 'info');
    return;
  }
  const intro = generateFemaleIntro(d.answers);
  d._introCache = intro;
  d._introOverride = intro;
  d.introOverride = intro;
  modifiedSet.add(idx);
  updateBatchBtn();
  renderCards();
}

// ==================== Modals ====================
function closeModal(id) { document.getElementById(id).classList.add('hidden'); pendingIdx = -1; }

// Rename
function openRename(idx) {
  pendingIdx = idx;
  document.getElementById('renameInput').value = allData[idx].nickname;
  document.getElementById('renameModal').classList.remove('hidden');
}
function confirmRename() {
  const newName = document.getElementById('renameInput').value.trim();
  if (!newName || pendingIdx < 0) return;
  const d = allData[pendingIdx];
  d.nickname = newName;
  modifiedSet.add(pendingIdx);
  updateBatchBtn();
  closeModal('renameModal');
  renderCards();
}

// Delete
function openDelete(idx) {
  pendingIdx = idx;
  document.getElementById('deleteMsg').textContent = `确定删除「${allData[idx].nickname}」的档案吗？`;
  document.getElementById('deleteModal').classList.remove('hidden');
}
async function confirmDelete() {
  if (pendingIdx < 0) return;
  const d = allData[pendingIdx];
  if (d._isHardcoded) { closeModal('deleteModal'); return; }
  try {
    const r = await fetch(`${API}/${d._filename}`, { headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' } });
    const fd = await r.json();
    await fetch(`${API}/${d._filename}`, {
      method: 'DELETE',
      headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify({ message: `删除: ${d.nickname}`, sha: fd.sha, branch: 'main' })
    });
    modifiedSet.delete(pendingIdx);
    allData.splice(pendingIdx, 1);
    // Re-index modifiedSet after splice
    const newSet = new Set();
    modifiedSet.forEach(i => { if (i < pendingIdx) newSet.add(i); else if (i > pendingIdx) newSet.add(i - 1); });
    modifiedSet = newSet;
    updateBatchBtn();
    closeModal('deleteModal');
    renderCards();
    showToast('删除成功', 'success');
  } catch(e) { showToast('删除失败', 'error'); console.error(e); }
}

// Edit intro
function openEditIntro(idx) {
  pendingIdx = idx;
  const d = allData[idx];
  let intro;
  if (d._isHardcoded) {
    intro = d._introOverride || { title: d.title, desc: d.desc };
  } else {
    intro = d._introOverride || d._introCache || generateFemaleIntro(d.answers);
  }
  document.getElementById('editTitleInput').value = intro.title;
  document.getElementById('editDescInput').value = intro.desc;
  document.getElementById('editIntroModal').classList.remove('hidden');
}
function confirmEditIntro() {
  if (pendingIdx < 0) return;
  const title = document.getElementById('editTitleInput').value.trim();
  const desc = document.getElementById('editDescInput').value.trim();
  if (!title || !desc) return;
  const d = allData[pendingIdx];
  d._introOverride = { title, desc };
  d.introOverride = { title, desc };
  modifiedSet.add(pendingIdx);
  updateBatchBtn();
  closeModal('editIntroModal');
  renderCards();
}

// ==================== Save Single Entry ====================
async function saveEntry(d) {
  if (d._isHardcoded) return; // Don't save hardcoded males
  try {
    const r = await fetch(`${API}/${d._filename}`, { headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' } });
    const fd = await r.json();
    const saveData = { ...d };
    delete saveData._filename; delete saveData._sha; delete saveData._introCache; delete saveData._introOverride; delete saveData._isHardcoded;
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(saveData, null, 2))));
    await fetch(`${API}/${d._filename}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify({ message: `更新: ${d.nickname}`, content, sha: fd.sha, branch: 'main' })
    });
    return true;
  } catch(e) { console.error(e); return false; }
}

// ==================== Batch Save ====================
async function batchSaveAll() {
  if (modifiedSet.size === 0) return;
  const btn = document.getElementById('batchSaveBtn');
  btn.disabled = true;
  btn.textContent = '📤 保存中...';

  let successCount = 0;
  let failCount = 0;

  for (const idx of modifiedSet) {
    const d = allData[idx];
    if (d._isHardcoded) {
      // Hardcoded males: skip saving but count as success
      successCount++;
      continue;
    }
    const ok = await saveEntry(d);
    if (ok) successCount++;
    else failCount++;
  }

  if (failCount === 0) {
    modifiedSet.clear();
    updateBatchBtn();
    showToast(`全部保存成功 (${successCount}条)`, 'success');
  } else {
    showToast(`${successCount}条成功，${failCount}条失败`, 'error');
  }

  renderCards();
}

// ==================== Deduplicate Nicknames ====================
function deduplicateNicknames(dataArr) {
  const nameCounts = {};
  dataArr.forEach(d => {
    const base = d.nickname;
    if (!nameCounts[base]) {
      nameCounts[base] = 1;
    } else {
      nameCounts[base]++;
      d.nickname = base + nameCounts[base];
    }
  });
}

// ==================== Load All ====================
async function loadAll() {
  const list = document.getElementById('cardList');
  list.innerHTML = '<div class="loading-text">正在加载...</div>';
  allData = [];
  modifiedSet.clear();
  updateBatchBtn();

  let submittedData = [];

  try {
    const resp = await fetch(API, { headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' } });
    if (resp.status !== 404) {
      const files = await resp.json();
      const jsonFiles = files.filter(f => f.name.endsWith('.json'));
      jsonFiles.sort((a, b) => b.name.localeCompare(a.name));

      // Parallel fetch all files
      const results = await Promise.all(jsonFiles.map(async (file) => {
        try {
          const r = await fetch(file.url, { headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' } });
          const fd = await r.json();
          const content = JSON.parse(decodeURIComponent(escape(atob(fd.content.replace(/\n/g, '')))));
          content._filename = file.name;
          if (content.introOverride) content._introOverride = content.introOverride;
          return content;
        } catch(e) { console.error(e); return null; }
      }));

      submittedData = results.filter(c => c !== null);
    }
  } catch(e) {
    console.error(e);
    list.innerHTML = '<div class="loading-text">加载失败，请重试</div>';
    return;
  }

  // Combine: submitted data first, then hardcoded males
  // Deep clone hardcoded males so we don't mutate the original
  const males = hardcodedMales.map(m => ({ ...m }));

  allData = [...submittedData, ...males];

  // Deduplicate nicknames
  deduplicateNicknames(allData);

  // Generate initial intro cache for female submissions
  allData.forEach(d => {
    if (!d._isHardcoded && !d._introOverride && d.answers) {
      d._introCache = generateFemaleIntro(d.answers);
    }
  });

  renderCards();
}

loadAll();
</script>
