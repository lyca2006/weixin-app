<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>群友档案管理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh; background: #0f0f1a;
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  color: #fff;
}
.container { max-width: 600px; margin: 0 auto; padding: 20px 16px 40px; }

.header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1);
}
.title { font-size: 20px; font-weight: 700; }
.count { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 4px; }
.refresh-btn {
  padding: 8px 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; color: #fff; font-size: 13px; cursor: pointer;
}

.filter-bar { display: flex; gap: 8px; margin-bottom: 20px; }
.filter-btn {
  padding: 6px 16px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.6); font-size: 13px; cursor: pointer;
}
.filter-btn.active { background: rgba(245,87,108,0.2); border-color: #f5576c; color: #fff; }

.loading-text { text-align: center; color: rgba(255,255,255,0.4); padding: 40px; font-size: 14px; }

.card {
  background: rgba(255,255,255,0.05); border-radius: 16px; padding: 20px;
  margin-bottom: 14px; border: 1px solid rgba(255,255,255,0.08);
}
.card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.card-left { display: flex; align-items: center; gap: 8px; flex: 1; }
.card-name {
  font-size: 18px; font-weight: 700;
  background: linear-gradient(135deg, #f093fb, #f5576c);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.card-gender { padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.card-gender.male { background: rgba(66,165,245,0.2); color: #42a5f5; }
.card-gender.female { background: rgba(245,87,108,0.2); color: #f5576c; }

.card-actions { display: flex; gap: 6px; }
.action-btn {
  padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.5); font-size: 11px;
  cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
.action-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
.action-btn.delete:hover { background: rgba(245,87,108,0.2); color: #f5576c; border-color: rgba(245,87,108,0.3); }

.card-time { font-size: 11px; color: rgba(255,255,255,0.2); margin-bottom: 10px; }
.card-answers { display: flex; flex-direction: column; gap: 8px; }
.card-row { display: flex; gap: 8px; font-size: 13px; line-height: 1.5; }
.card-label { color: rgba(255,255,255,0.35); flex-shrink: 0; min-width: 70px; }
.card-value { color: rgba(255,255,255,0.75); }

.empty-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.3); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }

/* 弹窗 */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center;
  z-index: 999;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: #1e1e30; border-radius: 16px; padding: 24px; width: 300px;
  border: 1px solid rgba(255,255,255,0.1);
}
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.modal-input {
  width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.15); border-radius: 10px;
  color: #fff; font-size: 15px; outline: none; margin-bottom: 16px;
}
.modal-input:focus { border-color: #f5576c; }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
.modal-btn {
  padding: 8px 20px; border-radius: 8px; border: none; font-size: 14px;
  font-weight: 600; cursor: pointer;
}
.modal-btn.cancel { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }
.modal-btn.confirm { background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; }
.modal-btn.danger { background: #e53935; color: #fff; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <div class="title">📋 群友档案</div>
      <div class="count" id="countText">加载中...</div>
    </div>
    <button class="refresh-btn" onclick="loadAll()">🔄 刷新</button>
  </div>

  <div class="filter-bar">
    <div class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">全部</div>
    <div class="filter-btn" data-filter="female" onclick="setFilter('female',this)">👩 女生</div>
    <div class="filter-btn" data-filter="male" onclick="setFilter('male',this)">🧑 男生</div>
  </div>

  <div id="cardList"><div class="loading-text">正在加载...</div></div>
</div>

<!-- 改名弹窗 -->
<div class="modal-overlay hidden" id="renameModal">
  <div class="modal">
    <div class="modal-title">✏️ 修改昵称</div>
    <input class="modal-input" id="renameInput" placeholder="输入新昵称">
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeRename()">取消</button>
      <button class="modal-btn confirm" onclick="confirmRename()">确定</button>
    </div>
  </div>
</div>

<!-- 删除确认弹窗 -->
<div class="modal-overlay hidden" id="deleteModal">
  <div class="modal">
    <div class="modal-title">🗑️ 确认删除</div>
    <div style="font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:16px;line-height:1.6" id="deleteMsg"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeDelete()">取消</button>
      <button class="modal-btn danger" onclick="confirmDelete()">删除</button>
    </div>
  </div>
</div>

<script>
let allData = [];
let currentFilter = 'all';
let pendingRenameIdx = -1;
let pendingDeleteIdx = -1;

const TK = ['ghp_wgKIbURm','KbscYDN03D','o84FOIRonx','bH1p1R8i'];
const TOKEN = TK.join('');
const API = 'https://api.github.com/repos/lyca2006/weixin-app/contents/submissions';

const LABELS = {
  style: '穿衣风格',
  date_detail: '约会细节',
  recharge: '充电方式',
  conflict: '冲突反应',
  heartbeat: '心动瞬间',
  hidden_trait: '隐形优点',
  sleep: '睡眠习惯',
  dealbreaker: '受不了的',
  money: '花钱方式',
  ideal_animal: '理想另一半'
};

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

function renderCards() {
  const list = document.getElementById('cardList');
  const filtered = currentFilter === 'all' ? allData : allData.filter(d => d.gender === currentFilter);
  document.getElementById('countText').textContent = `共 ${allData.length} 份档案` + (currentFilter !== 'all' ? `，当前显示 ${filtered.length} 份` : '');

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>暂无档案</div></div>';
    return;
  }

  list.innerHTML = filtered.map(d => {
    const idx = allData.indexOf(d);
    const rows = Object.entries(d.answers || {}).map(([k, v]) => {
      const label = LABELS[k] || k;
      return `<div class="card-row"><span class="card-label">${label}</span><span class="card-value">${v}</span></div>`;
    }).join('');

    return `<div class="card">
      <div class="card-top">
        <div class="card-left">
          <span class="card-name">${d.nickname}</span>
          <span class="card-gender ${d.gender}">${d.gender === 'male' ? '♂ 男' : '♀ 女'}</span>
        </div>
        <div class="card-actions">
          <button class="action-btn" onclick="openRename(${idx})">✏️ 改名</button>
          <button class="action-btn delete" onclick="openDelete(${idx})">🗑️ 删除</button>
        </div>
      </div>
      <div class="card-time">${d.time || ''}</div>
      <div class="card-answers">${rows}</div>
    </div>`;
  }).join('');
}

// 改名
function openRename(idx) {
  pendingRenameIdx = idx;
  document.getElementById('renameInput').value = allData[idx].nickname;
  document.getElementById('renameModal').classList.remove('hidden');
  setTimeout(() => document.getElementById('renameInput').focus(), 100);
}
function closeRename() {
  document.getElementById('renameModal').classList.add('hidden');
  pendingRenameIdx = -1;
}
async function confirmRename() {
  const newName = document.getElementById('renameInput').value.trim();
  if (!newName || pendingRenameIdx < 0) return;

  const d = allData[pendingRenameIdx];
  d.nickname = newName;

  try {
    const fileResp = await fetch(`${API}/${d._filename}`, {
      headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    const fileData = await fileResp.json();

    const saveData = { ...d };
    delete saveData._filename;
    delete saveData._sha;
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(saveData, null, 2))));

    await fetch(`${API}/${d._filename}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify({ message: `改名: ${newName}`, content: content, sha: fileData.sha, branch: 'main' })
    });

    closeRename();
    renderCards();
  } catch(e) {
    alert('修改失败，请重试');
    console.error(e);
  }
}

// 删除
function openDelete(idx) {
  pendingDeleteIdx = idx;
  document.getElementById('deleteMsg').textContent = `确定删除「${allData[idx].nickname}」的档案吗？此操作不可撤销。`;
  document.getElementById('deleteModal').classList.remove('hidden');
}
function closeDelete() {
  document.getElementById('deleteModal').classList.add('hidden');
  pendingDeleteIdx = -1;
}
async function confirmDelete() {
  if (pendingDeleteIdx < 0) return;
  const d = allData[pendingDeleteIdx];

  try {
    const fileResp = await fetch(`${API}/${d._filename}`, {
      headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    const fileData = await fileResp.json();

    await fetch(`${API}/${d._filename}`, {
      method: 'DELETE',
      headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify({ message: `删除档案: ${d.nickname}`, sha: fileData.sha, branch: 'main' })
    });

    allData.splice(pendingDeleteIdx, 1);
    closeDelete();
    renderCards();
  } catch(e) {
    alert('删除失败，请重试');
    console.error(e);
  }
}

async function loadAll() {
  const list = document.getElementById('cardList');
  list.innerHTML = '<div class="loading-text">正在加载...</div>';
  allData = [];

  try {
    const resp = await fetch(API, {
      headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
    });

    if (resp.status === 404) {
      allData = [];
      renderCards();
      return;
    }

    const files = await resp.json();
    const jsonFiles = files.filter(f => f.name.endsWith('.json'));
    jsonFiles.sort((a, b) => b.name.localeCompare(a.name));

    for (const file of jsonFiles) {
      try {
        const r = await fetch(file.url, {
          headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        const fd = await r.json();
        const content = JSON.parse(decodeURIComponent(escape(atob(fd.content.replace(/\n/g, '')))));
        content._filename = file.name;
        content._sha = fd.sha;
        allData.push(content);
      } catch(e) { console.error(e); }
    }

    renderCards();
  } catch(e) {
    list.innerHTML = '<div class="loading-text">加载失败，请重试</div>';
    console.error(e);
  }
}

loadAll();
</script>
</body>
</html>
