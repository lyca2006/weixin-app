<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>女神档案管理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: #0f0f1a;
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  color: #fff;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 20px 16px;
}

/* 登录页 */
.login-page {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 80vh;
  text-align: center;
}
.login-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 24px;
  color: rgba(255,255,255,0.8);
}
.login-input {
  padding: 14px 20px;
  width: 240px;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  color: #fff;
  font-size: 15px;
  text-align: center;
  outline: none;
  margin-bottom: 16px;
}
.login-input:focus { border-color: #f5576c; }
.login-input::placeholder { color: rgba(255,255,255,0.3); }
.login-btn {
  padding: 12px 40px;
  background: linear-gradient(135deg, #f093fb, #f5576c);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.login-error {
  color: #f5576c;
  font-size: 13px;
  margin-top: 12px;
  display: none;
}

/* 管理页 */
.admin-page { display: none; }
.admin-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.admin-title {
  font-size: 20px;
  font-weight: 700;
}
.admin-count {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
}
.refresh-btn {
  padding: 8px 16px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  color: #fff;
  font-size: 13px;
  cursor: pointer;
}

.loading-text {
  text-align: center;
  color: rgba(255,255,255,0.4);
  padding: 40px;
  font-size: 14px;
}

/* 卡片 */
.card {
  background: rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  border: 1px solid rgba(255,255,255,0.08);
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.card-avatar {
  width: 80px; height: 80px;
  border-radius: 12px;
  object-fit: cover;
  flex-shrink: 0;
  border: 2px solid rgba(245,87,108,0.3);
}
.card-info { flex: 1; }
.card-name {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 6px;
  background: linear-gradient(135deg, #f093fb, #f5576c);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.card-desc {
  font-size: 14px;
  color: rgba(255,255,255,0.65);
  line-height: 1.6;
  margin-bottom: 6px;
}
.card-time {
  font-size: 11px;
  color: rgba(255,255,255,0.25);
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: rgba(255,255,255,0.3);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="container">
  <!-- 登录页 -->
  <div id="loginPage" class="login-page">
    <div class="login-title">🔐 管理员验证</div>
    <input class="login-input" id="pwdInput" type="password" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">进入</button>
    <div class="login-error" id="loginError">密码错误</div>
  </div>

  <!-- 管理页 -->
  <div id="adminPage" class="admin-page">
    <div class="admin-header">
      <div>
        <div class="admin-title">👸 女神档案</div>
        <div class="admin-count" id="countText">加载中...</div>
      </div>
      <button class="refresh-btn" onclick="loadSubmissions()">🔄 刷新</button>
    </div>
    <div id="cardList"><div class="loading-text">正在加载...</div></div>
  </div>
</div>

<script>
const ADMIN_PWD = 'xiaoapp2026';

function doLogin() {
  const pwd = document.getElementById('pwdInput').value;
  if (pwd === ADMIN_PWD) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
    loadSubmissions();
  } else {
    const err = document.getElementById('loginError');
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 2000);
  }
}

async function loadSubmissions() {
  const cardList = document.getElementById('cardList');
  cardList.innerHTML = '<div class="loading-text">正在加载...</div>';

  try {
    const TK = ['ghp_wgKIbURm','KbscYDN03D','o84FOIRonx','bH1p1R8i'];
    const token = TK.join('');

    const resp = await fetch('https://api.github.com/repos/lyca2006/weixin-app/contents/submissions', {
      headers: {
        'Authorization': `token ${token}`,
        'Accept': 'application/vnd.github.v3+json'
      }
    });

    if (resp.status === 404) {
      cardList.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>还没有人提交档案</div></div>';
      document.getElementById('countText').textContent = '共 0 份档案';
      return;
    }

    const files = await resp.json();
    const jsonFiles = files.filter(f => f.name.endsWith('.json'));

    if (jsonFiles.length === 0) {
      cardList.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>还没有人提交档案</div></div>';
      document.getElementById('countText').textContent = '共 0 份档案';
      return;
    }

    document.getElementById('countText').textContent = `共 ${jsonFiles.length} 份档案`;

    // Sort by name (timestamp prefix = chronological)
    jsonFiles.sort((a, b) => b.name.localeCompare(a.name));

    let html = '';
    for (const file of jsonFiles) {
      try {
        const fileResp = await fetch(file.url, {
          headers: {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github.v3+json'
          }
        });
        const fileData = await fileResp.json();
        const content = JSON.parse(decodeURIComponent(escape(atob(fileData.content.replace(/\n/g, '')))));

        html += `
          <div class="card">
            <img class="card-avatar" src="${content.avatar}" alt="${content.name}">
            <div class="card-info">
              <div class="card-name">${content.name}</div>
              <div class="card-desc">${content.desc}</div>
              <div class="card-time">${content.time}</div>
            </div>
          </div>
        `;
      } catch(e) {
        console.error('Failed to load', file.name, e);
      }
    }

    cardList.innerHTML = html || '<div class="empty-state"><div class="icon">📭</div><div>加载失败</div></div>';
  } catch(e) {
    cardList.innerHTML = '<div class="loading-text">加载失败，请重试</div>';
    console.error(e);
  }
}
</script>
</body>
</html>
