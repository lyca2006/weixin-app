}
.card.modified { border-color: rgba(245,87,108,0.4); }

.card-gender.female { background: rgba(245,87,108,0.2); color: #f5576c; }

// ==================== Utility ====================
function findIdx(qid, ans) {
  const opts = femaleOptionTexts[qid];
  if (!opts || !ans) return -1;
  return opts.findIndex(o => ans === o || ans.includes(o.slice(2)) || o.includes(ans));
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => { t.classList.remove('show'); }, 2500);
}

// ==================== 统一入口 ====================
function generateIntro(d) {
  if (d._isHardcoded) return { title: d.title || '', desc: d.desc || '' };
  if (d.gender === 'male') return generateMaleIntro(d.answers);
  return generateFemaleIntro(d.answers);
}

// ==================== Filter ====================
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

    btnsHtml += `<button class="card-action-btn" onclick="openEditIntro(${idx})">✏️ 编辑</button>`;
    btnsHtml += `<button class="card-action-btn" onclick="openRename(${idx})">📝 改名</button>`;
    btnsHtml += `<button class="card-action-btn delete" onclick="openDelete(${idx})">🗑️ 删除</button>`;

    return `<div class="card${isModified ? ' modified' : ''}" id="card-${idx}">
      <div class="card-header">
        ${avatarHtml}
        <div class="card-meta">
          <div class="card-top-row">
            <div class="card-left">
              <span class="card-name">${d.nickname}</span>
              ${genderBadge}
            </div>
          </div>
          ${abcdHtml}
          <div class="card-time">${d.time || (isHardcoded ? '群友' : '')}</div>
        </div>
      </div>
      <div class="card-intro">
        <div class="intro-title">${displayTitle}</div>
        <div class="intro-desc">${displayDesc}</div>
      </div>
      <div class="card-btn-row">
        ${btnsHtml}
      </div>
    </div>`;
  }).join('');
}

// ==================== Regen Inline ====================
function regenInline(idx) {
  const d = allData[idx];
  if (d._isHardcoded) {
    // Hardcoded males don't have answers, so just regenerate is not meaningful
    // But we allow it to shuffle between original title/desc
    showToast('男生档案暂不支持重新生成', 'info');
    return;
  }
  const intro = generateIntro(d);
  d._introCache = intro;
  d._introOverride = intro;
  d.introOverride = intro;
  modifiedSet.add(idx);
  updateBatchBtn();
  renderCards();
}

// ==================== Modals ====================
function closeModal(id) { document.getElementById(id).classList.add('hidden'); pendingIdx = -1; }

// Rename
function openRename(idx) {
  pendingIdx = idx;
  document.getElementById('renameInput').value = allData[idx].nickname;
  document.getElementById('renameModal').classList.remove('hidden');
}
function confirmRename() {
  const newName = document.getElementById('renameInput').value.trim();
  if (!newName || pendingIdx < 0) return;
  const d = allData[pendingIdx];
  d.nickname = newName;
  modifiedSet.add(pendingIdx);
  updateBatchBtn();
  closeModal('renameModal');
  renderCards();
}

// Delete
function openDelete(idx) {
  pendingIdx = idx;
  document.getElementById('deleteMsg').textContent = `确定删除「${allData[idx].nickname}」的档案吗？`;
  document.getElementById('deleteModal').classList.remove('hidden');
}
async function confirmDelete() {
  if (pendingIdx < 0) return;
  const d = allData[pendingIdx];
  if (d._isHardcoded) {
    const deleted = JSON.parse(localStorage.getItem('deletedHardcoded') || '[]');
    deleted.push(d.nickname);
    localStorage.setItem('deletedHardcoded', JSON.stringify(deleted));
    allData.splice(pendingIdx, 1);
    closeModal('deleteModal');
    renderCards();
    showToast('删除成功', 'success');
    return;
  }
  try {
    const encodedFilename = encodeURIComponent(d._filename);
    const r = await fetch(`${API}/${encodedFilename}`, { headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' } });
    const fd = await r.json();
    await fetch(`${API}/${encodedFilename}`, {
      method: 'DELETE',
      headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify({ message: `删除: ${d.nickname}`, sha: fd.sha, branch: 'main' })
    });
    modifiedSet.delete(pendingIdx);
    allData.splice(pendingIdx, 1);
    // Re-index modifiedSet after splice
    const newSet = new Set();
    modifiedSet.forEach(i => { if (i < pendingIdx) newSet.add(i); else if (i > pendingIdx) newSet.add(i - 1); });
    modifiedSet = newSet;
    updateBatchBtn();
    closeModal('deleteModal');
    renderCards();
    showToast('删除成功', 'success');
  } catch(e) { showToast('删除失败', 'error'); console.error(e); }
}

// Edit intro
function openEditIntro(idx) {
  pendingIdx = idx;
  const d = allData[idx];
  let intro;
  if (d._isHardcoded) {
    intro = d._introOverride || { title: d.title, desc: d.desc };
  } else {
    intro = d._introOverride || d._introCache || generateIntro(d);
  }
  document.getElementById('editTitleInput').value = intro.title;
  document.getElementById('editDescInput').value = intro.desc;
  document.getElementById('editIntroModal').classList.remove('hidden');
}
function confirmEditIntro() {
  if (pendingIdx < 0) return;
  const title = document.getElementById('editTitleInput').value.trim();
  const desc = document.getElementById('editDescInput').value.trim();
  if (!title || !desc) return;
  const d = allData[pendingIdx];
  d._introOverride = { title, desc };
  d.introOverride = { title, desc };
  modifiedSet.add(pendingIdx);
  updateBatchBtn();
  closeModal('editIntroModal');
  renderCards();
}

// ==================== Save Single Entry ====================
async function saveEntry(d) {
  if (d._isHardcoded) return; // Don't save hardcoded males
  try {
    const encodedFilename = encodeURIComponent(d._filename);
    const r = await fetch(`${API}/${encodedFilename}`, { headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' } });
    const fd = await r.json();
    const saveData = { ...d };
    delete saveData._filename; delete saveData._sha; delete saveData._introCache; delete saveData._introOverride; delete saveData._isHardcoded;
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(saveData, null, 2))));
    await fetch(`${API}/${encodedFilename}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify({ message: `更新: ${d.nickname}`, content, sha: fd.sha, branch: 'main' })
    });
    return true;
  } catch(e) { console.error(e); return false; }
}

// ==================== Batch Save ====================
async function batchSaveAll() {
  if (modifiedSet.size === 0) return;
  const btn = document.getElementById('batchSaveBtn');
  btn.disabled = true;
  btn.textContent = '📤 保存中...';

  let successCount = 0;
  let failCount = 0;

  // 收集所有被修改的硬编码男生的override
  const hardcodedOverrides = {};
  for (const idx of modifiedSet) {
    const d = allData[idx];
    if (d._isHardcoded && d._introOverride) {
      hardcodedOverrides[d.nickname] = { title: d._introOverride.title, desc: d._introOverride.desc };
    }
  }

  // 如果有硬编码男生改动，先读取已有的overrides再合并保存
  if (Object.keys(hardcodedOverrides).length > 0) {
    try {
      const overrideFile = 'hardcoded-overrides.json';
      let existingSha = null;
      let existingData = {};
      const checkResp = await fetch(`${API}/${overrideFile}`, {
        headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (checkResp.ok) {
        const fd = await checkResp.json();
        existingSha = fd.sha;
        try { existingData = JSON.parse(decodeURIComponent(escape(atob(fd.content.replace(/\n/g, ''))))); } catch(e) {}
      }
      const merged = { ...existingData, ...hardcodedOverrides };
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(merged, null, 2))));
      const body = { message: '更新硬编码男生介绍', content, branch: 'main' };
      if (existingSha) body.sha = existingSha;
      const putResp = await fetch(`${API}/${overrideFile}`, {
        method: 'PUT',
        headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
        body: JSON.stringify(body)
      });
      if (putResp.ok) successCount++;
      else failCount++;
    } catch(e) { console.error(e); failCount++; }
  }

  for (const idx of modifiedSet) {
    const d = allData[idx];
    if (d._isHardcoded) continue; // 已在上面处理
    const ok = await saveEntry(d);
    if (ok) successCount++;
    else failCount++;
  }

  if (failCount === 0) {
    modifiedSet.clear();
    updateBatchBtn();
    showToast(`保存成功 (${successCount}条)，正在同步硬编码...`, 'success');
    await syncHardcoded(true);
  } else {
    showToast(`${successCount}条成功，${failCount}条失败`, 'error');
  }

  renderCards();
}

// ==================== Deduplicate Nicknames ====================
function deduplicateNicknames(dataArr) {
  const nameCounts = {};
  dataArr.forEach(d => {
    const base = d.nickname;
    if (!nameCounts[base]) {
      nameCounts[base] = 1;
    } else {
      nameCounts[base]++;
      d.nickname = base + nameCounts[base];
    }
  });
}

// ==================== Load All ====================
async function loadAll() {
  const list = document.getElementById('cardList');
  list.innerHTML = '<div class="loading-text">正在加载...</div>';
  allData = [];
  modifiedSet.clear();
  updateBatchBtn();

  let submittedData = [];

  try {
    const resp = await fetch(API, { headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' } });
    if (resp.status !== 404) {
      const files = await resp.json();
      const jsonFiles = files.filter(f => f.name.endsWith('.json'));
      jsonFiles.sort((a, b) => b.name.localeCompare(a.name));

      // Parallel fetch all files
      const results = await Promise.all(jsonFiles.map(async (file) => {
        try {
          const r = await fetch(file.url, { headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' } });
          const fd = await r.json();
          const content = JSON.parse(decodeURIComponent(escape(atob(fd.content.replace(/\n/g, '')))));
          content._filename = file.name;
          if (content.introOverride) content._introOverride = content.introOverride;
          return content;
        } catch(e) { console.error(e); return null; }
      }));

      submittedData = results.filter(c => c !== null && c._filename !== 'hardcoded-overrides.json');
    }
  } catch(e) {
    console.error(e);
    list.innerHTML = '<div class="loading-text">加载失败，请重试</div>';
    return;
  }

  // 读取硬编码男生的override并应用
  let hardcodedOverrides = {};
  try {
    const ovResp = await fetch(`${API}/hardcoded-overrides.json`, {
      headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (ovResp.ok) {
      const fd = await ovResp.json();
      hardcodedOverrides = JSON.parse(decodeURIComponent(escape(atob(fd.content.replace(/\n/g, '')))));
    }
  } catch(e) {}

  // Combine: submitted data first, then hardcoded males
  // Deep clone hardcoded males so we don't mutate the original
  const deletedHardcoded = new Set(JSON.parse(localStorage.getItem('deletedHardcoded') || '[]'));
  const males = hardcodedMales.filter(m => !deletedHardcoded.has(m.nickname)).map(m => {
    const ov = hardcodedOverrides[m.nickname];
    if (ov) return { ...m, _introOverride: ov, _introCache: ov };
    return { ...m };
  });

  allData = [...submittedData, ...males];

  // Deduplicate nicknames
  deduplicateNicknames(allData);

  // Generate intro only for entries without saved introOverride
  const needsSave = [];
  allData.forEach(d => {
    if (d._isHardcoded) return;
    if (d._introOverride || d.introOverride) {
      // Already has saved intro, use it
      if (d.introOverride && !d._introOverride) d._introOverride = d.introOverride;
      d._introCache = d._introOverride;
    } else if (d.answers) {
      // First time: generate and mark for auto-save
      const intro = generateIntro(d);
      d._introCache = intro;
      d._introOverride = intro;
      d.introOverride = intro;
      d._modified = true;
      needsSave.push(d);
    }
  });

  renderCards();

  // Auto-save newly generated intros to GitHub so they persist
  if (needsSave.length > 0) {
    console.log(`自动保存 ${needsSave.length} 个新生成的介绍`);
    for (const d of needsSave) {
      try { await saveEntry(d); } catch(e) { console.error('auto-save failed', e); }
    }
    updateBatchBtn();
  }
}

async function syncHardcoded(skipConfirm) {
  if (!skipConfirm && !confirm('将所有提交数据同步到测试页硬编码，确认？')) return;
  showToast('正在同步硬编码...', 'info');

  try {
    // 1. 读取 submissions/ 下所有 JSON
    const listResp = await fetch(API, { headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' } });
    const files = await listResp.json();
    const jsonFiles = files.filter(f => f.name.endsWith('.json') && f.name !== 'hardcoded-overrides.json');

    const results = await Promise.all(jsonFiles.map(async (file) => {
      try {
        const r = await fetch(file.url, { headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' } });
        const fd = await r.json();
        return JSON.parse(decodeURIComponent(escape(atob(fd.content.replace(/\n/g, '')))));
      } catch(e) { return null; }
    }));
    const allSubmissions = results.filter(c => c !== null);

    const females = allSubmissions.filter(c => c.gender === 'female').map(c => {
      const o = { nickname: c.nickname, gender: c.gender, avatar: c.avatar || '', answers: c.answers || {} };
      if (c.introOverride) o.introOverride = c.introOverride;
      return o;
    });
    const males = allSubmissions.filter(c => c.gender === 'male').map(c => {
      const o = { nickname: c.nickname, gender: c.gender, avatar: c.avatar || '', answers: c.answers || {} };
      if (c.introOverride) o.introOverride = c.introOverride;
      return o;
    });

    // 2. 读取 quiz-v2.html 并替换，支持 SHA 冲突重试
    const quizUrl = 'https://api.github.com/repos/lyca2006/weixin-app/contents/quiz-v2.html';
    const femalesJson = JSON.stringify(females);
    const malesJson = JSON.stringify(males);

    async function tryPut() {
      const quizResp = await fetch(quizUrl + '?ref=main', {
        headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
      });
      const quizFile = await quizResp.json();
      let quizContent = decodeURIComponent(escape(atob(quizFile.content.replace(/\n/g, ''))));

      quizContent = quizContent.replace(
        /const submittedMales = \[.*?\];/s,
        'const submittedMales = ' + malesJson + ';'
      );
      quizContent = quizContent.replace(
        /const submittedFemales = \[.*?\];/s,
        'const submittedFemales = ' + femalesJson + ';'
      );

      const putResp = await fetch(quizUrl, {
        method: 'PUT',
        headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
        body: JSON.stringify({
          message: '管理页同步硬编码: ' + males.length + '男 ' + females.length + '女',
          content: btoa(unescape(encodeURIComponent(quizContent))),
          sha: quizFile.sha,
          branch: 'main'
        })
      });
      return putResp;
    }

    let putResp = await tryPut();
    if (putResp.status === 409) {
      await new Promise(r => setTimeout(r, 1000));
      putResp = await tryPut();
    }

    if (putResp.ok) {
      showToast(`同步成功！${males.length}个男生 + ${females.length}个女生已写入硬编码`, 'success');
    } else {
      const err = await putResp.json();
      showToast('同步失败: ' + (err.message || putResp.status), 'error');
    }
  } catch(e) {
    console.error(e);
    showToast('同步失败: ' + e.message, 'error');
  }
}

loadAll();
