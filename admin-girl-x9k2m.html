<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh; background: #0f0f1a;

  color: #fff;
}
.container { max-width: 600px; margin: 0 auto; padding: 20px 16px 40px; }

.header {
  display: flex; justify-content: space-between; align-items: center;

}
.title { font-size: 20px; font-weight: 700; }
.count { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 4px; }
.header-btns { display: flex; gap: 8px; align-items: center; }
.refresh-btn, .batch-save-btn {
  padding: 8px 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; color: #fff; font-size: 13px; cursor: pointer; white-space: nowrap;
}
.batch-save-btn {
  background: linear-gradient(135deg, #f093fb, #f5576c); border: none; font-weight: 600;
  box-shadow: 0 2px 12px rgba(245,87,108,0.3);
}
.batch-save-btn:active { transform: scale(0.96); }
.batch-save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.filter-bar { display: flex; gap: 8px; margin-bottom: 20px; }
.filter-btn {
  padding: 6px 16px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.6); font-size: 13px; cursor: pointer;
}
.filter-btn.active { background: rgba(245,87,108,0.2); border-color: #f5576c; color: #fff; }

.loading-text { text-align: center; color: rgba(255,255,255,0.4); padding: 40px; font-size: 14px; }

.card {
  background: rgba(255,255,255,0.05); border-radius: 16px; padding: 16px;
  margin-bottom: 14px; border: 1px solid rgba(255,255,255,0.08);
  transition: border-color 0.3s;
}
.card.modified { border-color: rgba(245,87,108,0.4); }
.card-header { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 10px; }
.card-avatar {
  width: 56px; height: 56px; border-radius: 10px; object-fit: cover; flex-shrink: 0;
  border: 2px solid rgba(245,87,108,0.3);
}
.card-avatar-placeholder {
  width: 56px; height: 56px; border-radius: 10px; flex-shrink: 0;
  background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 24px;
}
.card-meta { flex: 1; min-width: 0; }
.card-top-row { display: flex; justify-content: space-between; align-items: center; }
.card-left { display: flex; align-items: center; gap: 6px; }
.card-name {
  font-size: 16px; font-weight: 700;
  background: linear-gradient(135deg, #f093fb, #f5576c);

.card-gender { padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 600; }
.card-gender.male { background: rgba(66,165,245,0.2); color: #42a5f5; }
.card-gender.female { background: rgba(245,87,108,0.2); color: #f5576c; }

  font-size: 14px; font-family: monospace; color: #4fc3f7; letter-spacing: 2px;
  user-select: all; padding: 2px 0; margin-top: 4px;
}
.card-time { font-size: 10px; color: rgba(255,255,255,0.2); margin-top: 2px; }

.intro-title {
  font-size: 15px; font-weight: 700; color: #fda085; margin-bottom: 6px;
  text-shadow: 0 0 8px rgba(253,160,133,0.3);
}
.intro-desc {
  font-size: 13px; color: rgba(255,255,255,0.65); line-height: 1.7;
}

.card-btn-row {
  display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap;
}
.card-action-btn {
  padding: 5px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.12);

.card-action-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

.empty-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.3); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }

/* 弹窗 */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center;
  z-index: 999;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: #1e1e30; border-radius: 16px; padding: 24px; width: 340px; max-width: 90vw;

.modal-input:focus { border-color: #f5576c; }
.modal-textarea {
  width: 100%; padding: 10px 12px; background: rgba(255,255,255,0.06);

.modal-label { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 6px; display: block; }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
.modal-btn {

.modal-btn.cancel { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }
.modal-btn.confirm { background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; }
.modal-btn.danger { background: #e53935; color: #fff; }

/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);

  z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.success { background: #2e7d32; color: #fff; }
.toast.error { background: #c62828; color: #fff; }
.toast.info { background: rgba(255,255,255,0.15); color: #fff; backdrop-filter: blur(10px); }
</style>

function findIdx(qid, ans) {
  const opts = femaleOptionTexts[qid];
  if (!opts || !ans) return -1;
  return opts.findIndex(o => ans === o || ans.includes(o.slice(2)) || o.includes(ans));
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => { t.classList.remove('show'); }, 2500);
}

function findMaleIdx(qid, ans) {
  const opts = maleOptionTexts[qid];
  if (!opts || !ans) return -1;
  return opts.findIndex(o => ans === o || ans.includes(o.slice(2)) || o.includes(ans));
}

// ==================== 统一入口 ====================
function generateIntro(d) {
  if (d.gender === 'male') return generateMaleIntro(d.answers);
  return generateFemaleIntro(d.answers);
}

// ==================== Filter ====================
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (f === 'deleted') {
    renderDeletedCards();
  } else {
    renderCards();
  }
}

// ==================== Render ====================
function renderCards() {
  const list = document.getElementById('cardList');
  const filtered = currentFilter === 'all' ? allData :
    currentFilter === 'female' ? allData.filter(d => d.gender === 'female') :
    allData.filter(d => d.gender === 'male');

  const totalFemale = allData.filter(d => d.gender === 'female').length;
  const totalMale = allData.filter(d => d.gender === 'male').length;
  document.getElementById('countText').textContent = `共 ${allData.length} 份档案 (👩${totalFemale} 🧑${totalMale})` + (currentFilter !== 'all' ? `，显示 ${filtered.length}` : '');

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>暂无档案</div></div>';
    return;
  }

  list.innerHTML = filtered.map(d => {
    const idx = allData.indexOf(d);
    const hasAnswers = d.answers && Object.keys(d.answers).length > 0;
    const isModified = modifiedSet.has(idx);

    // ABCD string (only for submitted users with answers)
    let abcdHtml = '';
    if (hasAnswers) {
      const isMale = d.gender === 'male';
      const useQids = isMale
        ? ['m_weekend','m_evening','m_food','m_flaw','m_together','m_stage','m_weakness','m_parents','m_social','m_essential']
        : qIds;
      const abcd = useQids.map(qid => {
        const ans = (d.answers || {})[qid] || '';
        const i = isMale ? findMaleIdx(qid, ans) : findIdx(qid, ans);
        return i >= 0 ? letters[i] : '?';
      }).join('');
      abcdHtml = `<div class="card-abcd">${abcd}</div>`;
    }

    // Title & desc
    let displayTitle, displayDesc;
    const intro = d._introOverride || d._introCache || generateIntro(d);
    if (!d._introOverride && !d._introCache) d._introCache = intro;
    displayTitle = intro.title;
    displayDesc = intro.desc;

    // Avatar
    const avatarHtml = d.avatar
      ? `<img class="card-avatar" src="${d.avatar}" alt="${d.nickname}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="card-avatar-placeholder" style="display:none">${d.gender === 'male' ? '🧑' : '👩'}</div>`
      : `<div class="card-avatar-placeholder">${d.gender === 'male' ? '🧑' : '👩'}</div>`;

    // Gender badge
    const genderBadge = d.gender === 'male'
      ? '<span class="card-gender male">♂ 男</span>'
      : '<span class="card-gender female">♀ 女</span>';

    // Buttons row
    let btnsHtml = `<button class="card-action-btn regen" onclick="regenInline(${idx})">🔄 换一版</button>`;
    btnsHtml += `<button class="card-action-btn" onclick="openEditIntro(${idx})">✏️ 编辑</button>`;
    btnsHtml += `<button class="card-action-btn" onclick="openRename(${idx})">📝 改名</button>`;
    btnsHtml += `<button class="card-action-btn delete" onclick="openDelete(${idx})">🗑️ 删除</button>`;

    return `<div class="card${isModified ? ' modified' : ''}" id="card-${idx}">
      <div class="card-header">
        ${avatarHtml}
        <div class="card-meta">
          <div class="card-top-row">
            <div class="card-left">
              <span class="card-name">${d.nickname}</span>
              ${genderBadge}
            </div>
          </div>
          ${abcdHtml}
          <div class="card-time">${d.time || ''}</div>
        </div>
      </div>
      <div class="card-intro">
        <div class="intro-title">${displayTitle}</div>
        <div class="intro-desc">${displayDesc}</div>
      </div>
      <div class="card-btn-row">
        ${btnsHtml}
      </div>
    </div>`;
  }).join('');
}

// ==================== Regen Inline ====================
function regenInline(idx) {
  const d = allData[idx];

  const intro = generateIntro(d);
  d._introCache = intro;
  d._introOverride = intro;
  d.introOverride = intro;
  modifiedSet.add(idx);
  updateBatchBtn();
  renderCards();
}

// ==================== Modals ====================
function closeModal(id) { document.getElementById(id).classList.add('hidden'); pendingIdx = -1; }

// Rename
function openRename(idx) {
  pendingIdx = idx;
  document.getElementById('renameInput').value = allData[idx].nickname;
  document.getElementById('renameModal').classList.remove('hidden');
}
function confirmRename() {
  const newName = document.getElementById('renameInput').value.trim();
  if (!newName || pendingIdx < 0) return;
  const d = allData[pendingIdx];
  d.nickname = newName;
  modifiedSet.add(pendingIdx);
  updateBatchBtn();
  closeModal('renameModal');
  renderCards();
}

function openDelete(idx) {
  pendingIdx = idx;
  document.getElementById('deleteMsg').textContent = `确定删除「${allData[idx].nickname}」的档案吗？`;
  document.getElementById('deleteModal').classList.remove('hidden');
}

    const ok = await saveEntry(d);
    if (ok) {
      allData.splice(pendingIdx, 1);
      const newSet = new Set();
      modifiedSet.forEach(i => { if (i < pendingIdx) newSet.add(i); else if (i > pendingIdx) newSet.add(i - 1); });
      modifiedSet = newSet;
      updateBatchBtn();
      closeModal('deleteModal');
      renderCards();
      showToast('已移到回收站', 'success');
    } else { showToast('操作失败', 'error'); }
  } catch(e) { showToast('操作失败', 'error'); console.error(e); }
}

// Edit intro
function openEditIntro(idx) {
  pendingIdx = idx;
  const d = allData[idx];
  const intro = d._introOverride || d._introCache || generateIntro(d);
  document.getElementById('editTitleInput').value = intro.title;
  document.getElementById('editDescInput').value = intro.desc;
  document.getElementById('editIntroModal').classList.remove('hidden');
}
function confirmEditIntro() {
  if (pendingIdx < 0) return;
  const title = document.getElementById('editTitleInput').value.trim();
  const desc = document.getElementById('editDescInput').value.trim();
  if (!title || !desc) return;
  const d = allData[pendingIdx];
  d._introOverride = { title, desc };
  d.introOverride = { title, desc };
  modifiedSet.add(pendingIdx);
  updateBatchBtn();
  closeModal('editIntroModal');
  renderCards();
}

// ==================== Save Single Entry ====================
async function saveEntry(d) {
  try {
    const r = await fetch(`${API}/${d._filename}`, { headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' } });
    const fd = await r.json();
    const saveData = { ...d };
    delete saveData._filename; delete saveData._sha; delete saveData._introCache; delete saveData._introOverride;
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(saveData, null, 2))));
    await fetch(`${API}/${d._filename}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify({ message: `更新: ${d.nickname}`, content, sha: fd.sha, branch: 'main' })
    });
    return true;
  } catch(e) { console.error(e); return false; }
}

// ==================== Batch Save ====================
async function batchSaveAll() {
  if (modifiedSet.size === 0) return;
  const btn = document.getElementById('batchSaveBtn');
  btn.disabled = true;
  btn.textContent = '📤 保存中...';

  let successCount = 0;
  let failCount = 0;

  for (const idx of modifiedSet) {
    const ok = await saveEntry(allData[idx]);
    if (ok) successCount++;
    else failCount++;
  }

  if (failCount === 0) {
    modifiedSet.clear();
    updateBatchBtn();
    showToast(`保存成功 (${successCount}条)，正在同步...`, 'success');
    await syncAll();
  } else {
    showToast(`${successCount}条成功，${failCount}条失败`, 'error');
  }

  renderCards();
}

// ==================== Deduplicate Nicknames ====================
function deduplicateNicknames(dataArr) {
  const nameCounts = {};
  dataArr.forEach(d => {
    const base = d.nickname;
    if (!nameCounts[base]) {
      nameCounts[base] = 1;
    } else {
      nameCounts[base]++;
      d.nickname = base + nameCounts[base];
    }
  });
}

// ==================== Load All ====================
async function loadAll() {
  const list = document.getElementById('cardList');
  list.innerHTML = '<div class="loading-text">正在加载...</div>';
  allData = [];
  modifiedSet.clear();
  updateBatchBtn();

  let submittedData = [];

  try {
    const resp = await fetch(API, { headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' } });
    if (resp.status !== 404) {
      const files = await resp.json();
      const jsonFiles = files.filter(f => f.name.endsWith('.json'));
      jsonFiles.sort((a, b) => b.name.localeCompare(a.name));

      // Fetch files in batches, render progressively
      submittedData = [];
      var totalFiles = jsonFiles.length;
      for (var i = 0; i < totalFiles; i += 8) {
        var batch = jsonFiles.slice(i, i + 8);
        list.innerHTML = '<div class="loading-text">正在加载... (' + Math.min(i + 8, totalFiles) + '/' + totalFiles + ')</div>';
        var batchResults = await Promise.all(batch.map(async function(file) {
          try {
            var r = await fetch(file.url, { headers: { 'Authorization': 'token ' + TOKEN, 'Accept': 'application/vnd.github.v3+json' } });
            var fd = await r.json();
            var bytes = Uint8Array.from(atob(fd.content.replace(/\n/g, '')), function(c) { return c.charCodeAt(0); });
            var content = JSON.parse(new TextDecoder().decode(bytes));
            content._filename = file.name;
            if (content.introOverride) content._introOverride = content.introOverride;
            return content;
          } catch(e) { return null; }
        }));
        batchResults.forEach(function(r) { if (r && r._filename !== 'hardcoded-overrides.json') submittedData.push(r); });
      }
    }
  } catch(e) {
    console.error(e);
    list.innerHTML = '<div class="loading-text">加载失败，请重试</div>';
    return;
  }



  allRawData = submittedData;
  allData = submittedData.filter(d => !d._deleted);

  // Deduplicate nicknames
  deduplicateNicknames(allData);

  // Generate intro only for entries without saved introOverride
  const needsSave = [];
  allData.forEach(d => {
    if (d._introOverride || d.introOverride) {
      // Already has saved intro, use it
      if (d.introOverride && !d._introOverride) d._introOverride = d.introOverride;
      d._introCache = d._introOverride;
    } else if (d.answers) {
      // First time: generate and mark for auto-save
      const intro = generateIntro(d);
      d._introCache = intro;
      d._introOverride = intro;
      d.introOverride = intro;
      d._modified = true;
      needsSave.push(d);
    }
  });

  renderCards();

  // Mark newly generated intros as modified (user can save manually)
  if (needsSave.length > 0) {
    console.log(needsSave.length + ' 个新档案需要生成介绍');
    needsSave.forEach((d, i) => {
      const idx = allData.indexOf(d);
      if (idx >= 0) modifiedSet.add(idx);
    });
    updateBatchBtn();
  }
}

function renderDeletedCards() {
  const deletedData = allRawData.filter(d => d._deleted);
  const list = document.getElementById('cardList');
  if (deletedData.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">🗑️</div><div>回收站为空</div></div>';
    return;
  }
  list.innerHTML = deletedData.map((d, i) => {
    const genderClass = d.gender === 'male' ? 'male' : 'female';
    const genderText = d.gender === 'male' ? '♂ 男' : '♀ 女';
    const avatarHtml = d.avatar
      ? '<img class="card-avatar" src="' + d.avatar + '" alt="' + d.nickname + '">'
      : '<div class="card-avatar-placeholder">' + (d.gender === 'male' ? '🧑' : '👩') + '</div>';
    const intro = d.introOverride || d._introOverride || {};
    return '<div class="card"><div class="card-header">' + avatarHtml +
      '<div class="card-meta"><div class="card-top-row"><div class="card-left"><div class="card-name">' + d.nickname +
      '</div><span class="card-gender ' + genderClass + '">' + genderText +
      '</span></div></div></div></div>' +
      (intro.title ? '<div class="card-intro"><div class="intro-title">' + intro.title + '</div><div class="intro-desc">' + (intro.desc||'') + '</div></div>' : '') +
      '<div class="card-btn-row">' +
      '<button class="card-action-btn regen" onclick="restoreEntry(' + i + ')">♻️ 恢复</button>' +
      '<button class="card-action-btn delete" onclick="permanentDelete(' + i + ')">🗑️ 彻底删除</button>' +
      '</div></div>';
  }).join('');
}

async function restoreEntry(deletedIdx) {
  const deletedData = allRawData.filter(d => d._deleted);
  const d = deletedData[deletedIdx];
  if (!d || !confirm('确认恢复「' + d.nickname + '」？')) return;
  delete d._deleted;
  const ok = await saveEntry(d);
  if (ok) {
    showToast('已恢复: ' + d.nickname, 'success');
    loadAll();
  } else { showToast('恢复失败', 'error'); }
}

async function permanentDelete(deletedIdx) {
  const deletedData = allRawData.filter(d => d._deleted);
  const d = deletedData[deletedIdx];
  if (!d || !confirm('确认彻底删除「' + d.nickname + '」？此操作不可撤销！')) return;
  try {
    const encodedFilename = encodeURIComponent(d._filename);
    const r = await fetch(API + '/' + encodedFilename, { headers: { 'Authorization': 'token ' + TOKEN, 'Accept': 'application/vnd.github.v3+json' } });
    const fd = await r.json();
    await fetch(API + '/' + encodedFilename, {
      method: 'DELETE',
      headers: { 'Authorization': 'token ' + TOKEN, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify({ message: '彻底删除: ' + d.nickname, sha: fd.sha, branch: 'main' })
    });
    showToast('已彻底删除: ' + d.nickname, 'success');
    loadAll();
  } catch(e) { showToast('删除失败', 'error'); console.error(e); }
}

async function syncAll() {
  showToast('正在同步...', 'info');
  try {
    var activeData = allRawData.filter(function(d) { return !d._deleted; });
    var females = activeData.filter(function(c) { return c.gender === 'female'; }).map(function(c) {
      var o = {nickname:c.nickname,gender:c.gender,avatar:c.avatar||'',answers:c.answers||{}};
      if(c.introOverride) o.introOverride = c.introOverride;
      if(c.types) o.types = c.types;
      return o;
    });
    var males = activeData.filter(function(c) { return c.gender === 'male'; }).map(function(c) {
      var o = {nickname:c.nickname,gender:c.gender,avatar:c.avatar||'',answers:c.answers||{}};
      if(c.introOverride) o.introOverride = c.introOverride;
      if(c.types) o.types = c.types;
      return o;
    });

    var QUIZ_URL = 'https://api.github.com/repos/lyca2006/weixin-app/contents/quiz-v2.html';
    var HOME_URL = 'https://api.github.com/repos/lyca2006/weixin-app/contents/home.html';
    var headers = { 'Authorization': 'token ' + TOKEN, 'Accept': 'application/vnd.github.v3+json' };

    // Helper: decode base64 content from GitHub API
    function b64decode(str) {
      var bytes = Uint8Array.from(atob(str.replace(/\n/g, '')), function(c) { return c.charCodeAt(0); });
      return new TextDecoder().decode(bytes);
    }

    // Helper: find end of JS array by bracket tracking
    function findArrayEnd(text, marker) {
      var idx = text.indexOf(marker);
      if (idx < 0) return null;
      var bStart = text.indexOf('[', idx);
      var depth = 0, i = bStart, inStr = false, strCh = '';
      while (i < text.length) {
        var c = text.charAt(i);
        if (inStr) {
          if (c === '\\') { i += 2; continue; }
          if (c === strCh) inStr = false;
        } else {
          if (c === '"' || c === "'" || c === '`') { inStr = true; strCh = c; }
          else if (c === '[') depth++;
          else if (c === ']') { depth--; if (depth === 0) return { start: idx, end: i + 1 }; }
        }
        i++;
      }
      return null;
    }

    // 1. Sync quiz-v2.html
    var qResp = await fetch(QUIZ_URL + '?ref=main', { headers: headers });
    var qFile = await qResp.json();
    var qText = b64decode(qFile.content);

    var mPos = findArrayEnd(qText, 'const submittedMales = ');
    if (mPos) qText = qText.slice(0, mPos.start) + 'const submittedMales = ' + JSON.stringify(males) + ';' + qText.slice(mPos.end + 1);
    var fPos = findArrayEnd(qText, 'const submittedFemales = ');
    if (fPos) qText = qText.slice(0, fPos.start) + 'const submittedFemales = ' + JSON.stringify(females) + ';' + qText.slice(fPos.end + 1);

    var qPut = await fetch(QUIZ_URL, {
      method: 'PUT', headers: { 'Authorization': 'token ' + TOKEN, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify({ message: males.length + '男' + females.length + '女', content: btoa(unescape(encodeURIComponent(qText))), sha: qFile.sha, branch: 'main' })
    });
    if (qPut.status === 409) {
      await new Promise(function(r) { setTimeout(r, 1500); });
      qResp = await fetch(QUIZ_URL + '?ref=main', { headers: headers });
      qFile = await qResp.json();
      qText = b64decode(qFile.content);
      mPos = findArrayEnd(qText, 'const submittedMales = ');
      if (mPos) qText = qText.slice(0, mPos.start) + 'const submittedMales = ' + JSON.stringify(males) + ';' + qText.slice(mPos.end + 1);
      fPos = findArrayEnd(qText, 'const submittedFemales = ');
      if (fPos) qText = qText.slice(0, fPos.start) + 'const submittedFemales = ' + JSON.stringify(females) + ';' + qText.slice(fPos.end + 1);
      qPut = await fetch(QUIZ_URL, {
        method: 'PUT', headers: { 'Authorization': 'token ' + TOKEN, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
        body: JSON.stringify({ message: males.length + '男' + females.length + '女', content: btoa(unescape(encodeURIComponent(qText))), sha: qFile.sha, branch: 'main' })
      });
    }

    // 2. Sync home.html scroll
    var hResp = await fetch(HOME_URL + '?ref=main', { headers: headers });
    var hFile = await hResp.json();
    var hText = b64decode(hFile.content);

    var scrollItems = activeData.map(function(d) {
      var intro = d.introOverride || d._introOverride || {};
      return {name: d.nickname, gender: d.gender || '', avatar: d.avatar || '', title: (intro.title || '').replace(/'/g, "\\'"), desc: (intro.desc || '').replace(/'/g, "\\'")};
    });
    scrollItems.sort(function(a, b) {
      var ha = 0, hb = 0;
      for (var i = 0; i < a.name.length; i++) ha = (ha * 31 + a.name.charCodeAt(i)) | 0;
      for (var i = 0; i < b.name.length; i++) hb = (hb * 31 + b.name.charCodeAt(i)) | 0;
      return ha - hb;
    });
    var scrollLines = scrollItems.map(function(s) {
      return "  {name:'" + s.name.replace(/'/g, "\\'") + "',gender:'" + s.gender + "',avatar:'" + s.avatar + "',title:'" + s.title + "',desc:'" + s.desc + "'}";
    });
    var scrollJs = 'const scrollMembers = [\n' + scrollLines.join(',\n') + '\n];';

    var sPos = findArrayEnd(hText, 'const scrollMembers = ');
    if (sPos) {
      var skipEnd = sPos.end;
      while (skipEnd < hText.length && (hText.charAt(skipEnd) === ';' || hText.charAt(skipEnd) === '\n')) skipEnd++;
      hText = hText.slice(0, sPos.start) + scrollJs + '\n' + hText.slice(skipEnd);
    }

    var hPut = await fetch(HOME_URL, {
      method: 'PUT', headers: { 'Authorization': 'token ' + TOKEN, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify({ message: '滚动条' + scrollItems.length + '人', content: btoa(unescape(encodeURIComponent(hText))), sha: hFile.sha, branch: 'main' })
    });
    if (hPut.status === 409) {
      await new Promise(function(r) { setTimeout(r, 1500); });
      hResp = await fetch(HOME_URL + '?ref=main', { headers: headers });
      hFile = await hResp.json();
      hText = b64decode(hFile.content);
      sStart = hText.indexOf('const scrollMembers = [');
      sEnd = hText.indexOf('];\n', sStart) + 3;
      hText = hText.slice(0, sStart) + scrollJs + hText.slice(sEnd);
      hPut = await fetch(HOME_URL, {
        method: 'PUT', headers: { 'Authorization': 'token ' + TOKEN, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
        body: JSON.stringify({ message: '滚动条' + scrollItems.length + '人', content: btoa(unescape(encodeURIComponent(hText))), sha: hFile.sha, branch: 'main' })
      });
    }

    if (qPut.ok && hPut.ok) showToast('全部同步完成！', 'success');
    else showToast('部分同步失败', 'error');
  } catch(e) { console.error(e); showToast('同步失败: ' + e.message, 'error'); }
}


loadAll();
