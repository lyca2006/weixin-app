// ==================== 页面逻辑 ====================
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function enterMaleMode() {
  currentMode = 'male';
  currentQ = 0;
  answers = [];
  showPage('quizPage');
  renderQuestion();
}

function enterFemaleMode() {
  currentMode = 'female';
  currentQ = 0;
  answers = [];
  showPage('quizPage');
  renderQuestion();
}

function restart() {
  showPage('modePage');
}

function getQuestions() {
  return currentMode === 'male' ? maleQuestions : femaleQuestions;
}

function renderQuestion() {
  const qs = getQuestions();
  const q = qs[currentQ];
  const percent = ((currentQ) / qs.length * 100).toFixed(0);
  document.getElementById('progressFill').style.width = percent + '%';
  document.getElementById('progressText').textContent = `${currentQ + 1} / ${qs.length}`;

  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'card-in 0.4s ease';

  const letters = ['A', 'B', 'C', 'D'];
  card.innerHTML = `
    <div class="question-num">第 ${currentQ + 1} 题</div>
    <div class="question-text">${q.q}</div>
    ${q.hint ? `<div class="question-hint">${q.hint}</div>` : ''}
    <div class="options">
      ${q.options.map((opt, i) => `
        <div class="option-btn" onclick="selectOption(${i}, this)">
          <div class="option-letter">${letters[i]}</div>
          <div>${typeof opt === 'string' ? opt : opt.text}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function selectOption(idx, el) {
  el.classList.add('selected');
  const allBtns = el.parentElement.querySelectorAll('.option-btn');
  allBtns.forEach(b => { b.style.pointerEvents = 'none'; });

  answers.push(['A', 'B', 'C', 'D'][idx]);

  setTimeout(() => {
    currentQ++;
    const qs = getQuestions();
    if (currentQ < qs.length) {
      renderQuestion();
    } else {
      if (currentMode === 'male') {
        showMaleResult();
      } else {
        showFemaleResult();
      }
    }
  }, 500);
}

// ==================== 男生模式 - 结果（维度匹配 + 从库拉取新男生） ====================
async function showMaleResult() {
  document.getElementById('loadingOverlay').classList.remove('hidden');

  try {
    // 1. 计算女生4维度得分
    const femScores = { stable: 0, romantic: 0, active: 0, growth: 0 };
    answers.forEach((ans, idx) => {
      const rule = pickMaleDimensionRules[idx];
      const dim = rule[ans];
      if (dim) femScores[dim]++;
    });

    // 2. 确定女生类型
    const max = Math.max(femScores.stable, femScores.romantic, femScores.active, femScores.growth);
    let femType = 'balanced';
    if (max >= 3) {
      const tops = [];
      if (femScores.stable === max) tops.push('stable');
      if (femScores.romantic === max) tops.push('romantic');
      if (femScores.active === max) tops.push('active');
      if (femScores.growth === max) tops.push('growth');
      if (tops.length === 1) femType = tops[0];
    }

    // 3. 用硬编码的新男生数据
    const newMales = cachedNewMales || [];

    // 4. 合并：老男生 + 新男生
    const allMales = [...members, ...newMales];

    // 5. 女→男匹配表
    const femaleToMaleMatch = {
      stable: ['stable', 'growth'],
      romantic: ['romantic', 'stable'],
      active: ['active', 'romantic'],
      growth: ['growth', 'active'],
      balanced: null
    };

    // 6. 10% 彩蛋
    let pool;
    if (Math.random() < 0.1) {
      pool = allMales;
    } else {
      const compatibleTypes = femaleToMaleMatch[femType];
      if (compatibleTypes) {
        pool = allMales.filter(m => m.types && m.types.some(t => compatibleTypes.includes(t)));
      } else {
        pool = allMales;
      }
      if (pool.length === 0) pool = allMales;
    }

    // 7. 随机选一个
    const match = pool[Math.floor(Math.random() * pool.length)];

    // 8. 显示结果
    document.getElementById('loadingOverlay').classList.add('hidden');
    showPage('resultPage');
    spawnHearts();

    const avatarHtml = match.avatar
      ? `<img class="result-avatar" src="${match.avatar}" alt="${match.name}">`
      : '<div style="width:130px;height:130px;border-radius:12px;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:48px;margin:0 auto 18px;">🧑</div>';

    document.getElementById('resultInner').innerHTML = `
      <div class="result-label">✨ 你的命中注定是 ✨</div>
      ${avatarHtml}
      <div class="result-name">${match.name}</div>
      <div class="result-title">${match.title}</div>
      <div class="result-desc">${match.desc}</div>
    `;
  } catch(e) {

    const match = members[Math.floor(Math.random() * members.length)];

    });

    // 5. 10% 彩蛋：随机从所有女生中选
    let pool;
    if (Math.random() < 0.1) {
      pool = scoredFemales;
    } else {
      // 根据匹配表筛选
      const compatibleDims = matchingTable[maleType] || ['stable', 'romantic', 'active', 'growth'];
      pool = scoredFemales.filter(f => {
        const fTypeKey = typeNameToDim(f.typeKey);
        return fTypeKey === null || compatibleDims.includes(fTypeKey);
      });
      // 如果筛选后为空，从所有女生中选
      if (pool.length === 0) pool = scoredFemales;
    }

    // 6. 随机选一个
    const chosen = pool[Math.floor(Math.random() * pool.length)];

    // 7. 生成介绍文案（优先用管理员编辑过的版本）
    const intro = chosen.introOverride || generateFemaleIntro(chosen.answers);

    // 8. 显示结果

      <div class="result-name">${chosen.nickname}</div>

}

// ==================== 维度计算 ====================
function determineMaleType(scores) {
  const max = Math.max(scores.stable, scores.romantic, scores.active, scores.growth);
  if (max < 3) return '均衡型';

  const tops = [];
  if (scores.stable === max) tops.push('安稳型');
  if (scores.romantic === max) tops.push('浪漫型');
  if (scores.active === max) tops.push('活力型');
  if (scores.growth === max) tops.push('成长型');

  if (tops.length > 1) return '均衡型';
  return tops[0];
}

function determineFemaleType(scores) {
  const max = Math.max(scores.stable, scores.romantic, scores.active, scores.growth);
  if (max < 3) return '均衡型';

  const tops = [];
  if (scores.stable === max) tops.push('安稳型');
  if (scores.romantic === max) tops.push('浪漫型');
  if (scores.active === max) tops.push('活力型');
  if (scores.growth === max) tops.push('成长型');

  if (tops.length > 1) return '均衡型';
  return tops[0];
}

function typeNameToDim(typeName) {
  const map = { '安稳型': 'stable', '浪漫型': 'romantic', '活力型': 'active', '成长型': 'growth', '均衡型': null };
  return map[typeName] !== undefined ? map[typeName] : null;
}

function scoreFemale(femaleAnswers) {
  const scores = { stable: 0, romantic: 0, active: 0, growth: 0 };

  femaleAnswerKeys.forEach((key, idx) => {
    const answerText = femaleAnswers[key];
    if (!answerText) return;

    const options = femaleOptionTexts[key];
    let answerIdx = options.findIndex(opt => answerText === opt);
    // 如果精确匹配失败，尝试模糊匹配
    if (answerIdx === -1) {
      answerIdx = options.findIndex(opt => answerText.includes(opt.slice(2)) || opt.includes(answerText));
    }
    if (answerIdx === -1) return;

    const letter = ['A', 'B', 'C', 'D'][answerIdx];
    const rule = femaleDimensionRules[idx];
    const dim = rule[letter];
    if (dim) scores[dim]++;
  });

  return scores;
}

// ==================== GitHub API ====================
async function fetchFemales() {
  const TK = ['ghp_wgKIbURm','KbscYDN03D','o84FOIRonx','bH1p1R8i'];
  const TOKEN = TK.join('');

  const listResp = await fetch('https://api.github.com/repos/lyca2006/weixin-app/contents/submissions', {
    headers: {
      'Authorization': `token ${TOKEN}`,
      'Accept': 'application/vnd.github.v3+json'
    }
  });

  if (!listResp.ok) throw new Error('Failed to fetch file list');

  const files = await listResp.json();
  const jsonFiles = files.filter(f => f.name.endsWith('.json'));

  // 并行获取所有文件内容
  const contents = await Promise.all(jsonFiles.map(async (f) => {
    try {
      const resp = await fetch(f.download_url);
      if (!resp.ok) return null;
      const data = await resp.json();
      return data;
    } catch (e) {
      return null;
    }
  }));

  // 只保留女生
  return contents.filter(c => c && c.gender === 'female');
}

    });

// ==================== 保存图片 ====================
function saveImage() {
  if (!confirm('确认保存结果图片？')) return;
  const card = document.querySelector('.result-card');
  const inner = document.getElementById('resultInner');

  // 临时设置实色背景，html2canvas 不支持 backdrop-filter
  const origCardBg = card.style.background;
  const origCardBdf = card.style.backdropFilter;
  const origCardWBdf = card.style.webkitBackdropFilter;
  card.style.background = 'linear-gradient(135deg, #1e2140, #2a1f4e)';
  card.style.backdropFilter = 'none';
  card.style.webkitBackdropFilter = 'none';

  // 确保文字颜色可见
  inner.querySelectorAll('.result-label, .result-name, .result-title, .result-desc').forEach(el => {
    el.dataset.origColor = el.style.color;
    if (!el.style.color) el.style.color = '#fff';
  });

  html2canvas(card, {
    backgroundColor: '#1a1a2e',
    scale: 2,
    useCORS: true,
    allowTaint: true
  }).then(canvas => {
    // 恢复样式
    card.style.background = origCardBg;
    card.style.backdropFilter = origCardBdf;
    card.style.webkitBackdropFilter = origCardWBdf;
    inner.querySelectorAll('.result-label, .result-name, .result-title, .result-desc').forEach(el => {
      el.style.color = el.dataset.origColor || '';
    });

    // 微信内置浏览器用 blob 方式触发保存
    canvas.toBlob(function(blob) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = '匹配结果.png';
      link.href = url;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }, 'image/png');
  }).catch(e => {
    card.style.background = origCardBg;
    card.style.backdropFilter = origCardBdf;
    card.style.webkitBackdropFilter = origCardWBdf;
    console.error(e);
    alert('保存失败，请长按截图保存');
  });
}

// ==================== 视觉效果 ====================
function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDuration = (1 + Math.random() * 3) + 's';
    star.style.animationDelay = (Math.random() * 3) + 's';
    star.style.width = star.style.height = (1 + Math.random() * 2) + 'px';
    container.appendChild(star);
  }
}

function spawnHearts() {
  const emojis = ['💕', '💗', '💖', '💘', '✨', '🌟', '💝'];
  for (let i = 0; i < 15; i++) {
    setTimeout(() => {
      const heart = document.createElement('div');
      heart.className = 'falling-heart';
      heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      heart.style.left = Math.random() * 100 + '%';
      heart.style.top = '-30px';
      heart.style.fontSize = (16 + Math.random() * 20) + 'px';
      heart.style.animationDuration = (3 + Math.random() * 3) + 's';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }, i * 200);
  }
}

	console.log('数据池: ' + cachedFemales.length + '个女生, ' + (cachedNewMales.length + members.length) + '个男生(含老成员)');
}
