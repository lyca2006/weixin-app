<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>天天向上一家人</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

@keyframes gradient-shift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

body {
  min-height: 100vh;
  background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #533483);
  background-size: 400% 400%;
  animation: gradient-shift 15s ease infinite;
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  color: #fff;
  overflow-x: hidden;
}

/* 星星背景 */
.stars {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 0;
}
.star {
  position: absolute;
  width: 2px; height: 2px;
  background: #fff;
  border-radius: 50%;
  animation: twinkle ease-in-out infinite alternate;
}
@keyframes twinkle {
  0% { opacity: 0.2; transform: scale(1); }
  100% { opacity: 1; transform: scale(1.5); }
}

.container {
  position: relative;
  z-index: 1;
  max-width: 420px;
  margin: 0 auto;
  padding: 20px 16px 40px;
  min-height: 100vh;
}

/* 页面切换 */
.page { display: none; }
.page.active { display: block; }

/* 模式选择页 */
.mode-page {
  text-align: center;
  padding-top: 12vh;
}
.mode-icon {
  font-size: 72px;
  margin-bottom: 20px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
.mode-title {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #f093fb, #f5576c, #fda085);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.mode-subtitle {
  font-size: 16px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 40px;
  line-height: 1.6;
}
.mode-buttons {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-bottom: 30px;
}
.mode-btn {
  flex: 1;
  max-width: 160px;
  padding: 28px 16px;
  border-radius: 20px;
  border: 2px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  cursor: pointer;
  transition: all 0.3s;
  -webkit-tap-highlight-color: transparent;
}
.mode-btn:active {
  transform: scale(0.95);
}
.mode-btn:hover {
  border-color: rgba(245,87,108,0.5);
  background: rgba(245,87,108,0.1);
  box-shadow: 0 8px 30px rgba(245,87,108,0.2);
}
.mode-btn .btn-icon {
  font-size: 40px;
}
.mode-btn .btn-label {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
}
.mode-note {
  margin-top: 10px;
  font-size: 16px;
  color: rgba(255,255,255,0.8);
  font-weight: 600;
}

/* 题目页 */
.quiz-page { padding-top: 20px; }
.progress-bar {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  margin-bottom: 8px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #f093fb, #f5576c);
  border-radius: 2px;
  transition: width 0.4s ease;
}
.progress-text {
  text-align: right;
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 30px;
}

.question-card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 28px 22px;
  border: 1px solid rgba(255,255,255,0.1);
  animation: card-in 0.4s ease;
}
@keyframes card-in {
  0% { opacity: 0; transform: translateX(40px); }
  100% { opacity: 1; transform: translateX(0); }
}

.question-num {
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 10px;
}
.question-text {
  font-size: 20px;
  font-weight: 600;
  line-height: 1.5;
  margin-bottom: 28px;
}
.question-hint {
  font-size: 13px;
  color: rgba(255,255,255,0.35);
  margin-bottom: 20px;
  font-style: italic;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.option-btn {
  display: flex;
  align-items: center;
  padding: 16px 18px;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  color: #fff;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.25s;
  -webkit-tap-highlight-color: transparent;
  text-align: left;
  line-height: 1.4;
}
.option-btn:active {
  transform: scale(0.97);
}
.option-btn.selected {
  background: rgba(245,87,108,0.2);
  border-color: #f5576c;
  box-shadow: 0 0 20px rgba(245,87,108,0.15);
}
.option-letter {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  margin-right: 14px;
  flex-shrink: 0;
  transition: all 0.25s;
}
.option-btn.selected .option-letter {
  background: #f5576c;
}

/* 结果页 */
.result-page {
  padding-top: 4vh;
  text-align: center;
}
.result-card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 36px 24px 28px;
  border: 1px solid rgba(255,255,255,0.1);
  animation: result-in 0.8s ease;
  position: relative;
  overflow: hidden;
}
@keyframes result-in {
  0% { opacity: 0; transform: scale(0.8) translateY(30px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
.result-card::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: conic-gradient(from 0deg, transparent, rgba(245,87,108,0.1), transparent, rgba(240,147,251,0.1), transparent);
  animation: rotate-bg 6s linear infinite;
}
@keyframes rotate-bg {
  100% { transform: rotate(360deg); }
}
.result-inner {
  position: relative;
  z-index: 1;
}

.result-label {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 16px;
  letter-spacing: 3px;
}
.result-avatar {
  width: 130px; height: 130px;
  border-radius: 12px;
  object-fit: cover;
  border: 3px solid rgba(245,87,108,0.5);
  box-shadow: 0 8px 30px rgba(245,87,108,0.3);
  margin-bottom: 18px;
  animation: avatar-glow 2s ease-in-out infinite alternate;
}
@keyframes avatar-glow {
  0% { box-shadow: 0 8px 30px rgba(245,87,108,0.3); }
  100% { box-shadow: 0 8px 50px rgba(245,87,108,0.6), 0 0 60px rgba(240,147,251,0.2); }
}
.result-name {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 6px;
  background: linear-gradient(135deg, #f093fb, #f5576c, #fda085);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.result-title {
  font-size: 18px;
  font-weight: 700;
  color: #fda085;
  margin-bottom: 20px;
  text-shadow: 0 0 12px rgba(253,160,133,0.4);
  letter-spacing: 1px;
}
.result-match {
  display: inline-block;
  padding: 6px 18px;
  background: linear-gradient(135deg, #f093fb, #f5576c);
  border-radius: 20px;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 20px;
}
.result-desc {
  font-size: 14px;
  line-height: 1.8;
  color: rgba(255,255,255,0.75);
  text-align: left;
  margin-bottom: 20px;
}
.result-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 24px;
}
.result-tag {
  padding: 5px 14px;
  background: rgba(255,255,255,0.08);
  border-radius: 16px;
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  border: 1px solid rgba(255,255,255,0.1);
}

.result-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
}
.retry-btn, .share-btn {
  padding: 12px 28px;
  border-radius: 24px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.retry-btn {
  background: rgba(255,255,255,0.1);
  color: #fff;
  border: 1.5px solid rgba(255,255,255,0.2);
}
.retry-btn:active { transform: scale(0.95); }
.share-btn {
  background: linear-gradient(135deg, #f093fb, #f5576c);
  color: #fff;
  box-shadow: 0 4px 20px rgba(245,87,108,0.4);
}
.share-btn:active { transform: scale(0.95); }

/* 心跳动画 */
.heartbeat { animation: heartbeat 1.2s ease-in-out infinite; }
@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  15% { transform: scale(1.15); }
  30% { transform: scale(1); }
  45% { transform: scale(1.1); }
}

/* 飘落的心 */
.falling-heart {
  position: fixed;
  font-size: 20px;
  pointer-events: none;
  z-index: 100;
  animation: fall linear forwards;
}
@keyframes fall {
  0% { opacity: 1; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(100vh) rotate(360deg); }
}

/* Loading */
.loading-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
}
.loading-overlay.hidden { display: none; }
.loading-spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(255,255,255,0.2);
  border-top-color: #f5576c;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { 100% { transform: rotate(360deg); } }
.loading-text {
  font-size: 14px;
  color: rgba(255,255,255,0.7);
}

/* 空状态 */
.empty-state {
  text-align: center;
  padding: 40px 20px;
}
.empty-icon {
  font-size: 64px;
  margin-bottom: 16px;
}
.empty-text {
  font-size: 16px;
  color: rgba(255,255,255,0.6);
  line-height: 1.6;
  margin-bottom: 24px;
}

.result-stats-unused {
  font-size: 10px; color: #fff; text-align: right;
  margin-bottom: -4px;
}
.result-avatar-row { text-align: center; margin-bottom: 0; }
.result-avatar-row img, .result-avatar-row div { margin-bottom: 6px; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="loading-overlay hidden" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">正在匹配中...</div>
</div>

<div class="container">
  <!-- 模式选择页 -->
  <div class="page active" id="modePage">

</div>

// ==================== 页面逻辑 ====================
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function enterMaleMode() {
  currentMode = 'male';
  currentQ = 0;
  answers = [];
  showPage('quizPage');
  renderQuestion();
}

function enterFemaleMode() {
  currentMode = 'female';
  currentQ = 0;
  answers = [];
  showPage('quizPage');
  renderQuestion();
}

function restart() {
  showPage('modePage');
}

function getQuestions() {
  return currentMode === 'male' ? maleQuestions : femaleQuestions;
}

function renderQuestion() {
  const qs = getQuestions();
  const q = qs[currentQ];
  const percent = ((currentQ) / qs.length * 100).toFixed(0);
  document.getElementById('progressFill').style.width = percent + '%';
  document.getElementById('progressText').textContent = `${currentQ + 1} / ${qs.length}`;

  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'card-in 0.4s ease';

  const letters = ['A', 'B', 'C', 'D'];
  card.innerHTML = `
    <div class="question-num">第 ${currentQ + 1} 题</div>
    <div class="question-text">${q.q}</div>
    ${q.hint ? `<div class="question-hint">${q.hint}</div>` : ''}
    <div class="options">
      ${q.options.map((opt, i) => `
        <div class="option-btn" onclick="selectOption(${i}, this)">
          <div class="option-letter">${letters[i]}</div>
          <div>${typeof opt === 'string' ? opt : opt.text}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function selectOption(idx, el) {
  el.classList.add('selected');
  const allBtns = el.parentElement.querySelectorAll('.option-btn');
  allBtns.forEach(b => { b.style.pointerEvents = 'none'; });

  answers.push(['A', 'B', 'C', 'D'][idx]);

  setTimeout(() => {
    currentQ++;
    const qs = getQuestions();
    if (currentQ < qs.length) {
      renderQuestion();
    } else {
      if (currentMode === 'male') {
        showMaleResult();
      } else {
        showFemaleResult();
      }
    }
  }, 500);
}

// ==================== 维度计算 ====================
function determineMaleType(scores) {
  const max = Math.max(scores.stable, scores.romantic, scores.active, scores.growth);
  if (max < 3) return '均衡型';

  const tops = [];
  if (scores.stable === max) tops.push('安稳型');
  if (scores.romantic === max) tops.push('浪漫型');
  if (scores.active === max) tops.push('活力型');
  if (scores.growth === max) tops.push('成长型');

  if (tops.length > 1) return '均衡型';
  return tops[0];
}

function determineFemaleType(scores) {
  const max = Math.max(scores.stable, scores.romantic, scores.active, scores.growth);
  if (max < 3) return '均衡型';

  const tops = [];
  if (scores.stable === max) tops.push('安稳型');
  if (scores.romantic === max) tops.push('浪漫型');
  if (scores.active === max) tops.push('活力型');
  if (scores.growth === max) tops.push('成长型');

  if (tops.length > 1) return '均衡型';
  return tops[0];
}

function typeNameToDim(typeName) {
  const map = { '安稳型': 'stable', '浪漫型': 'romantic', '活力型': 'active', '成长型': 'growth', '均衡型': null };
  return map[typeName] !== undefined ? map[typeName] : null;
}

function scoreFemale(femaleAnswers) {
  const scores = { stable: 0, romantic: 0, active: 0, growth: 0 };

  femaleAnswerKeys.forEach((key, idx) => {
    const answerText = femaleAnswers[key];
    if (!answerText) return;

    const options = femaleOptionTexts[key];
    let answerIdx = options.findIndex(opt => answerText === opt);
    // 如果精确匹配失败，尝试模糊匹配
    if (answerIdx === -1) {
      answerIdx = options.findIndex(opt => answerText.includes(opt.slice(2)) || opt.includes(answerText));
    }
    if (answerIdx === -1) return;

    const letter = ['A', 'B', 'C', 'D'][answerIdx];
    const rule = femaleDimensionRules[idx];
    const dim = rule[letter];
    if (dim) scores[dim]++;
  });

  return scores;
}

// ==================== GitHub API ====================
async function fetchFemales() {
  const TK = ['ghp_wgKIbURm','KbscYDN03D','o84FOIRonx','bH1p1R8i'];
  const TOKEN = TK.join('');

  const listResp = await fetch('https://api.github.com/repos/lyca2006/weixin-app/contents/submissions', {
    headers: {
      'Authorization': `token ${TOKEN}`,
      'Accept': 'application/vnd.github.v3+json'
    }
  });

  if (!listResp.ok) throw new Error('Failed to fetch file list');

  const files = await listResp.json();
  const jsonFiles = files.filter(f => f.name.endsWith('.json'));

  // 并行获取所有文件内容
  const contents = await Promise.all(jsonFiles.map(async (f) => {
    try {
      const resp = await fetch(f.download_url);
      if (!resp.ok) return null;
      const data = await resp.json();
      return data;
    } catch (e) {
      return null;
    }
  }));

  // 只保留女生
  return contents.filter(c => c && c.gender === 'female' && !c._deleted);
}

    const contents = await Promise.all(jsonFiles.map(async (f) => {
      try {
        const resp = await fetch(f.download_url);
        if (!resp.ok) return null;
        return await resp.json();
      } catch(e) { return null; }
    }));

    const males = contents.filter(c => c && c.gender === 'male' && !c._deleted);

    return males.map(m => {
      if (m.introOverride) {
        const intro = generateMaleIntro(m.answers);
        return {
          name: m.nickname,
          avatar: m.avatar || '',
          title: m.introOverride.title,
          desc: m.introOverride.desc,
          types: m.types || intro.types,
          _isSubmitted: true
        };
      }
      const intro = generateMaleIntro(m.answers);
      return {
        name: m.nickname,
        avatar: m.avatar || '',
        title: intro.title,
        desc: intro.desc,
        types: intro.types,
        _isSubmitted: true
      };
    });
  } catch(e) {
    console.error('fetchSubmittedMales error:', e);
    return [];
  }
}

// ==================== 保存图片 ====================
function saveImage() {
  if (!confirm('确认保存结果图片？')) return;
  const card = document.querySelector('.result-card');
  const inner = document.getElementById('resultInner');

  // 临时设置实色背景，html2canvas 不支持 backdrop-filter
  const origCardBg = card.style.background;
  const origCardBdf = card.style.backdropFilter;
  const origCardWBdf = card.style.webkitBackdropFilter;
  card.style.background = 'linear-gradient(135deg, #1e2140, #2a1f4e)';
  card.style.backdropFilter = 'none';
  card.style.webkitBackdropFilter = 'none';

  // 确保文字颜色可见
  inner.querySelectorAll('.result-label, .result-name, .result-title, .result-desc').forEach(el => {
    el.dataset.origColor = el.style.color;
    if (!el.style.color) el.style.color = '#fff';
  });

  html2canvas(card, {
    backgroundColor: '#1a1a2e',
    scale: 2,
    useCORS: true,
    allowTaint: true
  }).then(canvas => {
    // 恢复样式
    card.style.background = origCardBg;
    card.style.backdropFilter = origCardBdf;
    card.style.webkitBackdropFilter = origCardWBdf;
    inner.querySelectorAll('.result-label, .result-name, .result-title, .result-desc').forEach(el => {
      el.style.color = el.dataset.origColor || '';
    });

    // 微信内置浏览器用 blob 方式触发保存
    canvas.toBlob(function(blob) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = '匹配结果.png';
      link.href = url;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }, 'image/png');
  }).catch(e => {
    card.style.background = origCardBg;
    card.style.backdropFilter = origCardBdf;
    card.style.webkitBackdropFilter = origCardWBdf;
    console.error(e);
    alert('保存失败，请长按截图保存');
  });
}



function loadMatchStats(nickname, containerId, filename) {
  var TK = ['ghp_wgKIbURm','KbscYDN03D','o84FOIRonx','bH1p1R8i'].join('');
  var API = 'https://api.github.com/repos/lyca2006/weixin-app/contents/submissions';
  var headers = { 'Authorization': 'token ' + TK, 'Accept': 'application/vnd.github.v3+json' };
  
  if (!filename) { return; }
  
  fetch(API + '/' + encodeURIComponent(filename), { headers: headers })
    .then(function(r) { return r.json(); })
    .then(function(fd) {
      if (!fd || !fd.content) return;
      var bytes = Uint8Array.from(atob(fd.content.replace(/\n/g, '')), function(c) { return c.charCodeAt(0); });
      var data = JSON.parse(new TextDecoder().decode(bytes));
      var mc = data.matchCount || 0;
      var vc = data.viewCount || 0;
      var el = document.getElementById(containerId);
      if (el) el.innerHTML = '被匹配 ' + mc + '次 · 被查看 ' + vc + '次';
    })
    .catch(function() {
      var el = document.getElementById(containerId);
      if (el) el.innerHTML = '';
    });
}

function updateMatchCount(nickname, filename) {
  if (!filename) return;
  var TK = ['ghp_wgKIbURm','KbscYDN03D','o84FOIRonx','bH1p1R8i'].join('');
  var API = 'https://api.github.com/repos/lyca2006/weixin-app/contents/submissions';
  var headers = { 'Authorization': 'token ' + TK, 'Accept': 'application/vnd.github.v3+json' };
  
  fetch(API + '/' + encodeURIComponent(filename), { headers: headers })
    .then(function(r) { return r.json(); })
    .then(function(fd) {
      if (!fd || !fd.content) return;
      var bytes = Uint8Array.from(atob(fd.content.replace(/\n/g, '')), function(c) { return c.charCodeAt(0); });
      var data = JSON.parse(new TextDecoder().decode(bytes));
      
      data.matchCount = (data.matchCount || 0) + 1;
      
      var content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
      
      fetch(API + '/' + encodeURIComponent(filename), {
        method: 'PUT',
        headers: { 'Authorization': 'token ' + TK, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
        body: JSON.stringify({ message: 'matchCount+1: ' + nickname, content: content, sha: fd.sha, branch: 'main' })
      }).catch(function() {});
    })
    .catch(function() {});
}
