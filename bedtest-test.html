<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>床品测试</title>
<style>

* { margin: 0; padding: 0; box-sizing: border-box; }
@keyframes gradient-shift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
body {
  min-height: 100vh;
  background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #533483);
  background-size: 400% 400%;
  animation: gradient-shift 15s ease infinite;
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  color: #fff;
  overflow-x: hidden;
}
.stars { position: fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:0; }
.star { position:absolute; width:2px; height:2px; background:#fff; border-radius:50%; animation: twinkle ease-in-out infinite alternate; }
@keyframes twinkle { 0%{opacity:0.2;transform:scale(1)} 100%{opacity:1;transform:scale(1.5)} }
.container { position:relative; z-index:1; max-width:420px; margin:0 auto; padding:20px 16px 40px; min-height:100vh; }
.page { display:none; }
.page.active { display:block; }

/* 性别选择页 */
.mode-page { text-align:center; padding-top:10vh; }
.mode-icon { font-size:72px; margin-bottom:20px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
.mode-title {
  font-size:30px; font-weight:700; margin-bottom:12px;
  background: linear-gradient(135deg, #f093fb, #f5576c, #fda085);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.mode-subtitle { font-size:15px; color:rgba(255,255,255,0.6); margin-bottom:40px; line-height:1.6; }
.mode-buttons { display:flex; gap:16px; justify-content:center; margin-bottom:30px; }
.mode-btn {
  flex:1; max-width:160px; padding:28px 16px; border-radius:20px;
  border:2px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.06);
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
  cursor:pointer; transition:all 0.3s; -webkit-tap-highlight-color:transparent;
}
.mode-btn:active { transform:scale(0.95); }
.mode-btn:hover { border-color:rgba(245,87,108,0.5); background:rgba(245,87,108,0.1); }
.mode-btn .btn-icon { font-size:40px; }
.mode-btn .btn-label { font-size:18px; font-weight:700; color:#fff; }

/* 题目页 */
.quiz-page { padding-top:20px; }
.progress-bar { width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; margin-bottom:8px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,#f093fb,#f5576c); border-radius:2px; transition:width 0.4s ease; }
.progress-text { text-align:right; font-size:12px; color:rgba(255,255,255,0.4); margin-bottom:30px; }
.question-card {
  background:rgba(255,255,255,0.08); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-radius:20px; padding:28px 22px; border:1px solid rgba(255,255,255,0.1);
  animation: card-in 0.4s ease;
}
@keyframes card-in { 0%{opacity:0;transform:translateX(40px)} 100%{opacity:1;transform:translateX(0)} }
.question-num { font-size:13px; color:rgba(255,255,255,0.4); margin-bottom:10px; }
.question-text { font-size:20px; font-weight:600; line-height:1.5; margin-bottom:28px; }
.options { display:flex; flex-direction:column; gap:12px; }
.option-btn {
  display:flex; align-items:center; padding:16px 18px;
  background:rgba(255,255,255,0.06); border:1.5px solid rgba(255,255,255,0.12);
  border-radius:14px; color:#fff; font-size:15px; cursor:pointer;
  transition:all 0.25s; -webkit-tap-highlight-color:transparent; text-align:left; line-height:1.4;
}
.option-btn:active { transform:scale(0.97); }
.option-btn.selected { background:rgba(245,87,108,0.2); border-color:#f5576c; }
.option-letter {
  width:28px; height:28px; border-radius:50%; background:rgba(255,255,255,0.1);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:600; margin-right:14px; flex-shrink:0; transition:all 0.25s;
}
.option-btn.selected .option-letter { background:#f5576c; }

/* 结果页 */
.result-page { padding-top:4vh; text-align:center; }
.result-card {
  background:rgba(255,255,255,0.08); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-radius:24px; padding:20px 16px 20px; border:1px solid rgba(255,255,255,0.1);
  animation: result-in 0.8s ease; position:relative; overflow:hidden;
}
@keyframes result-in { 0%{opacity:0;transform:scale(0.6) translateY(40px)} 100%{opacity:1;transform:scale(1) translateY(0)} }
.result-card::before {
  content:''; position:absolute; top:-50%;left:-50%; width:200%;height:200%;
  background:conic-gradient(from 0deg,transparent,rgba(245,87,108,0.1),transparent,rgba(240,147,251,0.1),transparent);
  animation: rotate-bg 6s linear infinite;
}
@keyframes rotate-bg { 100%{transform:rotate(360deg)} }
.result-inner { position:relative; z-index:1; }
.result-type-emoji { font-size:28px; margin-right:8px; vertical-align:baseline; display:inline; line-height:1; }
.result-type-name { display:inline;
  font-size:28px; font-weight:700; margin-bottom:4px;
  background:linear-gradient(135deg,#f093fb,#f5576c,#fda085);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.result-type-desc { font-size:14px; color:rgba(255,255,255,0.5); margin-bottom:20px; }
.radar-wrap { display:flex; justify-content:center; margin-bottom:10px; }
.report-text {
  text-align:left; font-size:15px; line-height:1.8; color:rgba(255,255,255,0.85);
  background:rgba(255,255,255,0.05); border-radius:12px; padding:16px; margin-bottom:16px;
  min-height:80px;
}
.report-loading { text-align:center; color:rgba(255,255,255,0.4); padding:20px; }
.match-suggest {
  font-size:14px; color:#fda085; padding:10px 16px;
  background:rgba(253,160,133,0.1); border-radius:10px; margin-bottom:12px;
}
.result-actions { display:flex; gap:12px; justify-content:center; }
.action-btn {
  flex:1; padding:14px; border-radius:24px; border:none; font-size:15px; font-weight:600;
  cursor:pointer; transition:all 0.2s; -webkit-tap-highlight-color:transparent;
}
.action-btn:active { transform:scale(0.95); }
.action-btn.primary { background:linear-gradient(135deg,#f093fb,#f5576c); color:#fff; }
.action-btn.secondary { background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.2); }

/* Loading */
.loading-overlay { position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.7); display:flex;flex-direction:column;align-items:center;justify-content:center; z-index:999; }
.loading-overlay.hidden { display:none; }
.loading-spinner { width:36px;height:36px; border:3px solid rgba(255,255,255,0.2); border-top-color:#f5576c; border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { 100%{transform:rotate(360deg)} }
.loading-text { color:rgba(255,255,255,0.6); margin-top:12px; font-size:14px; }

</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="loading-overlay hidden" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">阿细正在为你评估床品...</div>
</div>

<div class="container">
  <div class="page active" id="modePage">
    <div class="mode-page">
      <div class="mode-icon">🛏️</div>
      <div class="mode-title">床品测试</div>
      <div class="mode-subtitle">测测你是什么类型的床上选手<br>阿细为你生成专属报告</div>
      <div class="mode-buttons">
        <div class="mode-btn" onclick="startQuiz('male')">
          <div class="btn-icon">🧑</div>
          <div class="btn-label">我是男生</div>
        </div>
        <div class="mode-btn" onclick="startQuiz('female')">
          <div class="btn-icon">👩</div>
          <div class="btn-label">我是女生</div>
        </div>
      </div>
    </div>
  </div>

  <div class="page" id="quizPage">
    <div class="quiz-page">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-text" id="progressText">1 / 12</div>
      <div class="question-card" id="questionCard"></div>
    </div>
  </div>

  <div class="page" id="resultPage">
    <div class="result-page">
      <div class="result-card">
        <div class="result-inner" id="resultInner"></div>
      </div>
      <div class="result-actions" style="margin-top:24px">
        <button class="action-btn secondary" onclick="restart()">再测一次</button>
        <button class="action-btn primary" onclick="goHome()">返回首页</button>
      </div>
    </div>
  </div>
</div>

var gender = '';
var currentQ = 0;

var scores = {};

function showPage(id) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function startQuiz(g) {
  gender = g;
  currentQ = 0;
  specialTriggered = false;
  scores = {'主动性':0,'体力':0,'技巧':0,'情趣':0,'温柔度':0,'持久力':0};

  // Random 12 from 30
  var qs = gender === 'male' ? maleQuestions : femaleQuestions;
  var shuffled = qs.slice().sort(function() { return Math.random() - 0.5; });
  selectedQs = shuffled.slice(0, 12);

  // 50% chance to insert special question at position 9 (10th question)
  if (Math.random() < 0.5 && specialQuestions.length > 0) {
    var sp = specialQuestions[Math.floor(Math.random() * specialQuestions.length)];
    selectedQs[11] = sp;
    specialTriggered = true;
  }

  showPage('quizPage');
  renderQuestion();
}

function restart() {
  showPage('modePage');
}

function goHome() {
  window.location.href = 'home-test.html';
}

function renderQuestion() {
  var q = selectedQs[currentQ];
  var total = selectedQs.length;
  var percent = (currentQ / total * 100).toFixed(0);
  document.getElementById('progressFill').style.width = percent + '%';
  document.getElementById('progressText').textContent = (currentQ + 1) + ' / ' + total;

  var card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'card-in 0.4s ease';

  var letters = ['A','B','C','D'];
  var html = '<div class="question-num">第 ' + (currentQ + 1) + ' 题</div>';
  html += '<div class="question-text">' + q.q + '</div>';
  html += '<div class="options">';
  q.options.forEach(function(opt, i) {
    html += '<div class="option-btn" onclick="selectOption(' + i + ', this)">';
    html += '<div class="option-letter">' + letters[i] + '</div>';
    html += '<div>' + opt.text + '</div></div>';
  });
  html += '</div>';
  card.innerHTML = html;
}

function selectOption(idx, el) {
  el.classList.add('selected');
  var allBtns = el.parentElement.querySelectorAll('.option-btn');
  allBtns.forEach(function(b) { b.style.pointerEvents = 'none'; });

  var q = selectedQs[currentQ];
  var opt = q.options[idx];

  // Handle special question effects
  if (q.isSpecial) {
    if (opt.effect === 'random+3') {
      var dims = Object.keys(scores);
      var rd = dims[Math.floor(Math.random() * dims.length)];
      scores[rd] += 3;
    } else if (opt.effect === 'all=0') {
      for (var k in scores) scores[k] = 0;
    }
    // 'none' does nothing
  } else {
    // Normal scoring: add dims
    if (opt.dims) {
      for (var dim in opt.dims) {
        scores[dim] += opt.dims[dim];
      }
    }
  }

  setTimeout(function() {
    currentQ++;
    if (currentQ < selectedQs.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }, 500);
}

function determineType() {
  // All zero = 废柴
  var total = 0;
  for (var k in scores) total += scores[k];
  if (total <= 0) return '一条废柴';

  var sorted = Object.entries(scores).sort(function(a, b) { return b[1] - a[1]; });
  var topDim = sorted[0][0];
  var dimToType = {
    '温柔度':'温柔骑士','主动性':'野性猎手','技巧':'技术流',
    '情趣':'感觉派','体力':'探索家','持久力':'探索家'
  };
  var type = dimToType[topDim] || '技术流';
  if (sorted[0][1] === sorted[1][1]) {
    var pair = [sorted[0][0], sorted[1][0]].sort().join('+');
    if (pair.indexOf('体力') >= 0 && pair.indexOf('持久力') >= 0) type = '探索家';
    if (pair.indexOf('温柔度') >= 0 && pair.indexOf('情趣') >= 0) type = '感觉派';
    if (pair.indexOf('主动性') >= 0 && pair.indexOf('技巧') >= 0) type = '野性猎手';
  }
  return type;
}

  var maxVal = 1;
  for (var i = 0; i < dims.length; i++) {
    if (scores[dims[i]] > maxVal) maxVal = scores[dims[i]];
  }
  maxVal = Math.max(maxVal, 6);

  for (var level = 3; level >= 1; level--) {
    var r = radius * (level / 3);
    ctx.beginPath();
    for (var i = 0; i <= n; i++) {
      var angle = (Math.PI * 2 * i) / n - Math.PI / 2;
      ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  for (var i = 0; i < n; i++) {
    var angle = (Math.PI * 2 * i) / n - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + radius * Math.cos(angle), cy + radius * Math.sin(angle));
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.stroke();
  }
  ctx.beginPath();
  for (var i = 0; i <= n; i++) {
    var idx = i % n;
    var angle = (Math.PI * 2 * idx) / n - Math.PI / 2;
    var val = Math.min(1, scores[dims[idx]] / maxVal);
    val = Math.max(0.08, val);
    ctx.lineTo(cx + radius * val * Math.cos(angle), cy + radius * val * Math.sin(angle));
  }
  ctx.fillStyle = 'rgba(245, 87, 108, 0.25)';
  ctx.fill();
  ctx.strokeStyle = '#f5576c';
  ctx.lineWidth = 2;
  ctx.stroke();
  for (var i = 0; i < n; i++) {
    var angle = (Math.PI * 2 * i) / n - Math.PI / 2;
    var val = Math.min(1, scores[dims[i]] / maxVal);
    val = Math.max(0.08, val);
    ctx.beginPath();
    ctx.arc(cx + radius * val * Math.cos(angle), cy + radius * val * Math.sin(angle), 4, 0, Math.PI * 2);
    ctx.fillStyle = '#f5576c';
    ctx.fill();
  }
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.font = '12px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (var i = 0; i < n; i++) {
    var angle = (Math.PI * 2 * i) / n - Math.PI / 2;
    ctx.fillText(dims[i], cx + (radius + 20) * Math.cos(angle), cy + (radius + 20) * Math.sin(angle));
  }
}

function generateAIReport(type, callback) {
  var TK = ['ghp_wgKIbURm','KbscYDN03D','o84FOIRonx','bH1p1R8i'].join('');
  var genderText = gender === 'male' ? '男生' : '女生';
  var scoreDesc = Object.entries(scores).map(function(e) { return e[0]+':'+e[1]+'分'; }).join('、');

  var prompt = '帮我分析这个人的床品。\n\n' +
    '性别：' + genderText + '\n' +
    '床品类型：' + type + '\n' +
    '六维得分：' + scoreDesc + '\n\n' +
    '要求：\n' +
    '1. 用一句露骨但搞笑的话总结ta的床上风格（比如"你就是那种前戏比正片长的人"）\n' +
    '2. 对最高分的维度要认真夸，夸得具体、到位、让人开心（比如技巧高就夸手法出神入化）\n' +
    '3. 对最低分的维度可以毒舌损一下，用搞笑的比喻（可以用网络热梗、成人笑话等）\n' +
    '4. 最后用一句损友式的忠告结尾\n' +
    '5. 可以露骨，可以开黄腔，但要搞笑不要猥琐\n' +
    '6. 150字以内，整体基调是夸为主、损为辅';

  fetch('https://models.inference.ai.azure.com/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + TK
    },
    body: JSON.stringify({
      model: 'gpt-4o-mini',
      messages: [
        { role: 'system', content: '你是「阿细」，一个毒舌但专业的床品分析师，说话风格像损友，擅长用露骨但搞笑的方式点评别人的床上表现。你不会回避敏感词，但会用幽默包装。' },
        { role: 'user', content: prompt }
      ],
      max_tokens: 300,
      temperature: 0.9
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.choices && data.choices[0] && data.choices[0].message) {
      callback(data.choices[0].message.content);
    } else {
      callback(fallbackReports[type]);
    }
  })
  .catch(function(e) {
    console.error('AI API error:', e);
    callback(fallbackReports[type]);
  });
}

    s.style.animationDuration = (Math.random() * 3 + 2) + 's';
    s.style.animationDelay = Math.random() * 3 + 's';
    c.appendChild(s);
  }
}
