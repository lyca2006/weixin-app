<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>天天向上一家人</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

@keyframes gradient-shift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

body {
  min-height: 100vh;
  background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #533483);
  background-size: 400% 400%;
  animation: gradient-shift 15s ease infinite;
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  color: #fff;
  overflow-x: hidden;
}

.stars { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0; }
.star { position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%; animation: twinkle ease-in-out infinite alternate; }
@keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; } }

.container {
  position: relative; z-index: 1;
  max-width: 420px; margin: 0 auto; padding: 20px 16px;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}

@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

.hero-icon { font-size: 48px; margin-bottom: 4px; }

.hero-title {
  font-size: 26px; font-weight: 800; margin-bottom: 8px; margin-top: 2px; text-align: center;
  background: linear-gradient(135deg, #f093fb, #f5576c, #fda085);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.hero-subtitle {
  font-size: 13px; color: rgba(255,255,255,0.45); margin-bottom: 32px; text-align: center;
}

/* 分隔线标题 */
.divider-title {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px; width: 100%;
}
.divider-title::before, .divider-title::after {
  content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.12);
}
.divider-title span {
  font-size: 14px; color: rgba(255,255,255,0.85); font-weight: 700; white-space: nowrap;
}

/* 填写资料卡 */
.profile-card {
  width: 100%; padding: 20px; border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  display: flex; align-items: center; gap: 14px; margin-bottom: 28px;
}
.profile-card .p-icon { font-size: 32px; flex-shrink: 0; }
.profile-card .p-info { flex: 1; }
.profile-card .p-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.profile-card .p-desc { font-size: 11px; color: rgba(255,255,255,0.4); }
.profile-card .p-btn {
  padding: 10px 18px; border-radius: 12px; border: none; flex-shrink: 0;
  background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff;
  font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none;
  white-space: nowrap; transition: all 0.2s;
}
.profile-card .p-btn:active { transform: scale(0.95); }

/* 匹配卡片 */
.match-cards { display: flex; gap: 12px; width: 100%; }
.match-card {
  flex: 1; padding: 24px 16px 18px; border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  text-decoration: none; color: #fff; transition: all 0.3s;
  -webkit-tap-highlight-color: transparent;
}
.match-card:active { transform: scale(0.96); }
.match-card:hover {
  border-color: rgba(245,87,108,0.4);
  background: rgba(245,87,108,0.08);
}
.match-card .m-icon { font-size: 36px; }
.match-card .m-title { font-size: 16px; font-weight: 700; }
.match-card .m-btn {
  padding: 8px 20px; border-radius: 10px; border: none;
  background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff;
  font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.match-card .m-btn:active { transform: scale(0.95); }

/* 滚动头像展示 */
.scroll-section { width: 100vw; margin-left: calc(-50vw + 50%); margin-top: 8px; overflow: hidden; }
.scroll-section .divider-title { padding: 0 20px; margin-bottom: 12px; }
.scroll-track {
  display: flex; gap: 20px; width: max-content;
  animation: scrollLeft 30s linear infinite;
  touch-action: pan-y;
}
.scroll-item { -webkit-user-select: none; user-select: none; touch-action: manipulation; }
@keyframes scrollLeft { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
.scroll-item {
  display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0;
}
.scroll-item img {
  width: 44px; height: 44px; border-radius: 50%; object-fit: cover;
  border: 1.5px solid rgba(255,255,255,0.15);
}
.scroll-item span { font-size: 11px; color: rgba(255,255,255,0.5); white-space: nowrap; }

/* 弹出卡片 */
.card-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); z-index: 100;
  justify-content: center; align-items: center;
  animation: fadeIn 0.2s ease;
}
.card-overlay.show { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.popup-card {
  background: rgba(30,30,48,0.98); border-radius: 20px; padding: 28px 22px;
  width: 320px; max-width: 88vw; border: 1px solid rgba(255,255,255,0.12);
  text-align: center; animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.popup-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(245,87,108,0.4); margin-bottom: 12px; }
.popup-avatar-placeholder { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 12px; }
.popup-name { font-size: 20px; font-weight: 800; margin-bottom: 6px;
  background: linear-gradient(135deg, #f093fb, #f5576c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.popup-title { font-size: 14px; font-weight: 700; color: #fda085; margin-bottom: 10px; }
.popup-desc { font-size: 13px; color: rgba(255,255,255,0.65); line-height: 1.8; text-align: left; }
.popup-loading { color: rgba(255,255,255,0.4); font-size: 13px; padding: 20px; }
.popup-gender { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; margin-bottom: 8px; vertical-align: middle; line-height: 1.4; }
.popup-gender.male { background: rgba(66,165,245,0.2); color: #42a5f5; }
.popup-gender.female { background: rgba(245,87,108,0.2); color: #f5576c; }

.popup-stats {
  display: flex; flex-direction: column; align-items: flex-start; gap: 2px; margin-bottom: 8px;
  font-size: 10px; color: #fff; position: absolute; top: 12px; right: 16px;
}
.popup-stats span { display: inline-block; }
.popup-stats .stat-num { display: inline-block; min-width: 28px; text-align: right; }
.popup-card { position: relative; }



/* 阿细语录 */
.axi-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 0;
}
.hero-icon {
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  transform-origin: center;
  flex-shrink: 0;
  margin-bottom: 0 !important;
  align-self: center;
  display: flex;
  align-items: center;
  position: relative;
}
.hero-icon img {
  display: block;
  vertical-align: middle;
}
.hero-icon::after {
  content: '💬';
  position: absolute;
  top: -6px;
  right: -10px;
  font-size: 18px;
  animation: badge-bounce 2s ease-in-out infinite;
  pointer-events: none;
}
@keyframes badge-bounce {
  0%, 100% { transform: translateY(0) scale(1); }
  40% { transform: translateY(-4px) scale(1.15); }
  60% { transform: translateY(-2px) scale(1.08); }
}
.axi-row.active .hero-icon::after {
  display: none;
}
.axi-row.active .hero-icon { transform: translateX(-16px); }

.axi-bubble-chat {
  display: none;
  background: #95EC69;
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 16px;
  color: #111;
  line-height: 1.3em;
  max-width: 232px;
  position: relative;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  opacity: 0;
  transform: scale(0.8);
  transform-origin: left center;
  transition: opacity 0.25s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  align-self: center;
}

.axi-bubble-chat::before {
  content: '';
  position: absolute;
  left: -6px; top: 10px;
  border: 6px solid transparent;
  border-right-color: #95EC69;
  border-left: 0;
}
#axiText {
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  word-break: break-all;
}
.axi-row.active .axi-bubble-chat { display: block; }
.axi-row.active .axi-bubble-chat.visible {
  opacity: 1;
  transform: scale(1);
}
</style>
</head>

function buildScroll(members) {
  var track = document.getElementById('scrollTrack');
  var html = members.map(function(m, idx) {
    return '<div class="scroll-item" data-idx="' + idx + '" style="cursor:pointer"><img src="' + m.avatar + '" alt="' + m.name + '" loading="lazy"><span>' + m.name + '</span></div>';
  }).join('');
  track.innerHTML = html + html;
}
buildScroll(scrollMembers);

document.getElementById('scrollTrack').addEventListener('click', function(e) {
  var item = e.target.closest('.scroll-item');
  if (!item) return;
  var idx = parseInt(item.getAttribute('data-idx')) % scrollMembers.length;
  if (idx >= 0 && idx < scrollMembers.length) {
    showCard(scrollMembers[idx]);
  }
});

function showCard(data) {
  var overlay = document.getElementById('cardOverlay');
  if (data) { renderCard(data); } else { document.getElementById('popupContent').innerHTML = '<div class="popup-loading">未找到该成员</div>'; }
  overlay.classList.add('show');
}

function closeCard() { document.getElementById('cardOverlay').classList.remove('show'); }

function renderCard(data) {
  var popup = document.getElementById('popupContent');
  var gc = data.gender === 'male' ? 'male' : 'female';
  var gt = data.gender === 'male' ? '🧑 男生' : '👩 女生';
  var av = data.avatar ? '<img class="popup-avatar" src="' + data.avatar + '" alt="' + data.name + '">' : '<div class="popup-avatar-placeholder">' + (data.gender === 'male' ? '🧑' : '👩') + '</div>';
  var stats = '<div class="popup-stats" id="popupStats">加载中...</div>';
  popup.innerHTML = stats + av + '<div class="popup-name">' + data.name + '</div><span class="popup-gender ' + gc + '">' + gt + '</span>' + (data.title ? '<div class="popup-title">' + data.title + '</div>' : '') + (data.desc ? '<div class="popup-desc">' + data.desc + '</div>' : '');
  loadAndUpdateViewCount(data.name, data._filename);
}

function loadAndUpdateViewCount(nickname, filename) {
  var TK = ['ghp_wgKIbURm','KbscYDN03D','o84FOIRonx','bH1p1R8i'].join('');
  var API = 'https://api.github.com/repos/lyca2006/weixin-app/contents/submissions';
  var headers = { 'Authorization': 'token ' + TK, 'Accept': 'application/vnd.github.v3+json' };
  
  fetch(API + '/' + encodeURIComponent(filename), { headers: headers })
    .then(function(r) { return r.json(); })
    .then(function(fd) {
      if (!fd || !fd.content) return;
      var bytes = Uint8Array.from(atob(fd.content.replace(/\n/g, '')), function(c) { return c.charCodeAt(0); });
      var data = JSON.parse(new TextDecoder().decode(bytes));
      
      var mc = data.matchCount || 0;
      var vc = (data.viewCount || 0) + 1;
      
      var el = document.getElementById('popupStats');
      if (el) el.innerHTML = '<span>被匹配 <span class="stat-num">' + mc + '</span> 次</span><span>被查看 <span class="stat-num">' + vc + '</span> 次</span>';
      
      data.viewCount = vc;
      
      var saveData = JSON.parse(JSON.stringify(data));
      var content = btoa(unescape(encodeURIComponent(JSON.stringify(saveData, null, 2))));
            
      fetch(API + '/' + encodeURIComponent(filename), {
        method: 'PUT',
        headers: { 'Authorization': 'token ' + TK, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
        body: JSON.stringify({ message: 'viewCount+1: ' + nickname, content: content, sha: fd.sha, branch: 'main' })
      }).catch(function() {});
    })
    .catch(function() {
      var el = document.getElementById('popupStats');
      if (el) el.innerHTML = '';
    });
}
