<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

@keyframes gradient-shift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

body {
  min-height: 100vh;
  background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #533483);
  background-size: 400% 400%;
  animation: gradient-shift 15s ease infinite;
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  color: #fff;
}

.stars { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0; }
.star { position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%; animation: twinkle ease-in-out infinite alternate; }
@keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; } }

.container { position: relative; z-index: 1; max-width: 420px; margin: 0 auto; padding: 20px 16px 40px; min-height: 100vh; }
.page { display: none; }
.page.active { display: block; }

/* 开始页 */
.start-page { text-align: center; padding-top: 4vh; }
.start-title {
  font-size: 24px; font-weight: 800; margin-bottom: 10px;
  background: linear-gradient(135deg, #f093fb, #f5576c, #fda085);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.start-subtitle { font-size: 13px; color: rgba(255,255,255,0.45); line-height: 1.6; margin-bottom: 28px; }

/* 分区标签 */
.section-label {
  font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 12px; text-align: center;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.section-label::before, .section-label::after {
  content: ''; flex: 1; max-width: 60px; height: 1px; background: rgba(255,255,255,0.12);
}

/* 性别选择 */
.gender-section { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }
.gender-btn {
  flex: 1; max-width: 160px; height: 52px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06); display: flex; flex-direction: row;
  align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.gender-btn:active { transform: scale(0.95); }
.gender-btn.selected { border-color: #f5576c; background: rgba(245,87,108,0.15); box-shadow: 0 4px 20px rgba(245,87,108,0.3); }
.gender-btn .icon { font-size: 22px; }
.gender-btn .label { font-size: 15px; font-weight: 600; }

/* 表单区域 */
.form-group { margin-bottom: 20px; }
.form-label { font-size: 13px; color: rgba(255,255,255,0.55); margin-bottom: 10px; text-align: center; }

/* 头像上传 */
.avatar-area {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.avatar-box {
  width: 72px; height: 72px; border-radius: 50%; background: rgba(255,255,255,0.06);
  border: 2px dashed rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center;
  cursor: pointer; overflow: hidden; transition: all 0.2s;
}
.avatar-box:hover { border-color: rgba(245,87,108,0.5); }
.avatar-placeholder { text-align: center; color: rgba(255,255,255,0.3); font-size: 11px; line-height: 1.4; }

/* 昵称输入 */
.name-input {
  width: 100%; max-width: 200px; padding: 10px 16px; background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.12); border-radius: 12px;
  color: #fff; font-size: 16px; text-align: center; outline: none; transition: border-color 0.2s;
  display: block; margin: 0 auto;
}
.name-input:focus { border-color: rgba(245,87,108,0.6); }
.name-input::placeholder { color: rgba(255,255,255,0.3); }

.start-btn {
  display: inline-block; padding: 14px 48px; margin-top: 8px;
  background: linear-gradient(135deg, #f093fb, #f5576c); border: none; border-radius: 28px;
  color: #fff; font-size: 17px; font-weight: 700; cursor: pointer;
  box-shadow: 0 6px 24px rgba(245,87,108,0.4); -webkit-tap-highlight-color: transparent;
  transition: all 0.2s; letter-spacing: 1px;
}
.start-btn:active { transform: scale(0.95); }
.start-btn:disabled { opacity: 0.4; pointer-events: none; }
.error-hint { color: #f5576c; font-size: 13px; margin-top: 8px; min-height: 20px; text-align: center; }

/* 题目页 */
.quiz-page { padding-top: 20px; }
.progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 8px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #f093fb, #f5576c); border-radius: 2px; transition: width 0.4s ease; }
.progress-text { text-align: right; font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 24px; }

.question-card {
  background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 20px; padding: 28px 22px; border: 1px solid rgba(255,255,255,0.1);
  animation: card-in 0.4s ease;
}
@keyframes card-in { 0% { opacity: 0; transform: translateX(40px); } 100% { opacity: 1; transform: translateX(0); } }

.q-num { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 10px; }
.q-text { font-size: 19px; font-weight: 600; line-height: 1.5; margin-bottom: 24px; }

.options { display: flex; flex-direction: column; gap: 10px; }
.opt-btn {
  display: flex; align-items: center; padding: 14px 16px;
  background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 12px; color: #fff; font-size: 15px; cursor: pointer;
  transition: all 0.2s; -webkit-tap-highlight-color: transparent; text-align: left; line-height: 1.4;
}
.opt-btn:active { transform: scale(0.97); }
.opt-btn.selected { background: rgba(245,87,108,0.2); border-color: #f5576c; }
.opt-letter {
  width: 26px; height: 26px; border-radius: 50%; background: rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; margin-right: 12px; flex-shrink: 0; transition: all 0.2s;
}
.opt-btn.selected .opt-letter { background: #f5576c; }

/* 自填输入 */
.custom-input-wrap { margin-top: 10px; display: flex; gap: 8px; }
.custom-input {
  flex: 1; padding: 12px 14px; background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.12); border-radius: 10px;
  color: #fff; font-size: 14px; outline: none;
}
.custom-input:focus { border-color: rgba(245,87,108,0.6); }
.custom-input::placeholder { color: rgba(255,255,255,0.3); }
.custom-submit {
  padding: 12px 18px; background: linear-gradient(135deg, #f093fb, #f5576c);
  border: none; border-radius: 10px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
}

/* 打分题 */
.score-grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
}
.score-btn {
  padding: 14px 0; background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 12px; color: #fff; font-size: 18px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; text-align: center; -webkit-tap-highlight-color: transparent;
}
.score-btn:active { transform: scale(0.92); }
.score-btn.selected { background: rgba(245,87,108,0.25); border-color: #f5576c; }

/* 自由输入题 */
.free-input {
  width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.12); border-radius: 12px;
  color: #fff; font-size: 15px; outline: none; resize: none; height: 90px;
  font-family: inherit; line-height: 1.6;
}
.free-input:focus { border-color: rgba(245,87,108,0.6); }
.free-input::placeholder { color: rgba(255,255,255,0.3); }
.free-submit {
  margin-top: 12px; width: 100%; padding: 14px;
  background: linear-gradient(135deg, #f093fb, #f5576c); border: none; border-radius: 12px;
  color: #fff; font-size: 16px; font-weight: 600; cursor: pointer;
}

/* 结果页 */
.result-page { text-align: center; padding-top: 15vh; }
.result-icon { font-size: 72px; margin-bottom: 16px; }
.result-title {
  font-size: 24px; font-weight: 700; margin-bottom: 10px;
  background: linear-gradient(135deg, #f093fb, #f5576c, #fda085);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.result-desc { font-size: 15px; color: rgba(255,255,255,0.55); line-height: 1.8; }
.match-btn {
  margin-top: 28px; padding: 16px 36px; border-radius: 28px; border: none;
  background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff;
  font-size: 17px; font-weight: 700; cursor: pointer; letter-spacing: 1px;
  box-shadow: 0 4px 20px rgba(245,87,108,0.4); transition: all 0.2s;
  animation: float 3s ease-in-out infinite;
}
.match-btn:active { transform: scale(0.95); }

/* Loading */
.loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 999; }
.loading.hidden { display: none; }
.loading-spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #f5576c; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>

<script>

let avatarBase64 = null;

function handleImage(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const size = 200;
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const minDim = Math.min(img.width, img.height);
      const sx = (img.width - minDim) / 2;
      const sy = (img.height - minDim) / 2;
      ctx.drawImage(img, sx, sy, minDim, minDim, 0, 0, size, size);
      avatarBase64 = canvas.toDataURL('image/jpeg', 0.7);
      const preview = document.getElementById('avatarPreview');
      preview.innerHTML = `<img src="${avatarBase64}" style="width:100%;height:100%;object-fit:cover">`;
      preview.style.borderStyle = 'solid';
      preview.style.borderColor = 'rgba(245,87,108,0.5)';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}

let activeQuestions = [];

function createStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.animationDuration = (1+Math.random()*3)+'s';
    s.style.animationDelay = (Math.random()*3)+'s';
    c.appendChild(s);
  }
}

function selectGender(g, el) {
  gender = g;
  document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');

// ==================== 维度计算 ====================
function determineMaleType(scores) {
  const max = Math.max(scores.stable, scores.romantic, scores.active, scores.growth);
  if (max < 3) return '均衡型';

  const tops = [];
  if (scores.stable === max) tops.push('安稳型');
  if (scores.romantic === max) tops.push('浪漫型');
  if (scores.active === max) tops.push('活力型');
  if (scores.growth === max) tops.push('成长型');

  if (tops.length > 1) return '均衡型';
  return tops[0];
}

function determineFemaleType(scores) {
  const max = Math.max(scores.stable, scores.romantic, scores.active, scores.growth);
  if (max < 3) return '均衡型';

  const tops = [];
  if (scores.stable === max) tops.push('安稳型');
  if (scores.romantic === max) tops.push('浪漫型');
  if (scores.active === max) tops.push('活力型');
  if (scores.growth === max) tops.push('成长型');

  if (tops.length > 1) return '均衡型';
  return tops[0];
}

function typeNameToDim(typeName) {
  const map = { '安稳型': 'stable', '浪漫型': 'romantic', '活力型': 'active', '成长型': 'growth', '均衡型': null };
  return map[typeName] !== undefined ? map[typeName] : null;
}

function scoreFemale(femaleAnswers) {
  const scores = { stable: 0, romantic: 0, active: 0, growth: 0 };

  femaleAnswerKeys.forEach((key, idx) => {
    const answerText = femaleAnswers[key];
    if (!answerText) return;

    const options = femaleOptionTexts[key];
    let answerIdx = options.findIndex(opt => answerText === opt);
    // 如果精确匹配失败，尝试模糊匹配
    if (answerIdx === -1) {
      answerIdx = options.findIndex(opt => answerText.includes(opt.slice(2)) || opt.includes(answerText));
    }
    if (answerIdx === -1) return;

    const letter = ['A', 'B', 'C', 'D'][answerIdx];
    const rule = femaleDimensionRules[idx];
    const dim = rule[letter];
    if (dim) scores[dim]++;
  });

  return scores;
}

async function submitAll() {
  document.getElementById('loading').classList.remove('hidden');

  const profile = {
    nickname: nickname,
    gender: gender,
    avatar: avatarBase64,
    answers: answers,
    time: new Date().toLocaleString('zh-CN')
  };

  const intro = gender === 'female' ? generateFemaleIntro(answers) : generateMaleIntro(answers);
  profile.introOverride = { title: intro.title, desc: intro.desc };

  try {
    const TK = ['ghp_wgKIbURm','KbscYDN03D','o84FOIRonx','bH1p1R8i'];
    const token = TK.join('');
    const ts = Date.now();
    const safeName = nickname.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g, '_');
    const filename = `submissions/${gender}_${ts}_${safeName}.json`;
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(profile, null, 2))));

    const resp = await fetch(`https://api.github.com/repos/lyca2006/weixin-app/contents/${filename}`, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${token}`,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github.v3+json'
      },
      body: JSON.stringify({ message: `档案: ${nickname}`, content: content, branch: 'main' })
    });

    if (resp.ok) {
      console.log('资料提交成功');
    } else {
      alert('提交失败，请稍后重试');
    }
  } catch(e) {
    alert('网络错误，请检查网络后重试');
    console.error(e);
  }

  document.getElementById('loading').classList.add('hidden');
}
